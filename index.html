<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>表情包搜索 Pro</title>

<style>
body {
    background: #0f0c29;
    color: white;
    font-family: sans-serif;
    padding: 20px;
}

.search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    background: orange;
    font-weight: bold;
    cursor: pointer;
}

.tabs {
    margin-bottom: 15px;
}

.tabs button {
    margin-right: 8px;
}

.active {
    background: yellow;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
    gap: 10px;
}

.card img {
    width: 100%;
    border-radius: 10px;
}
</style>
</head>

<body>

<h2>🎬 表情包搜索</h2>

<div class="tabs">
    <button class="active" onclick="setSource('tenor')">Tenor</button>
    <button onclick="setSource('giphy')">GIPHY</button>
    <button onclick="loadTrending()">🔥 热门</button>
</div>

<div class="search-box">
    <input id="q" placeholder="输入关键词..." />
    <button onclick="search()">搜索</button>
</div>

<div id="status"></div>
<div class="grid" id="grid"></div>

<script>
const TENOR_KEY = "LIVDSRZULELA";
const GIPHY_KEY = "0L3xTl0lJ9lZ4kQqQZ9Q8X5nO3wW2oKk";

let source = "tenor";
let debounceTimer = null;

// 切换源
function setSource(s){
    source = s;
    document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");
}

// 防抖
document.getElementById("q").addEventListener("input", e=>{
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(()=>{
        search();
    },400);
});

// 搜索
async function search(){
    let q = document.getElementById("q").value.trim();
    if(!q) return;

    document.getElementById("status").innerText="搜索中...";

    let url = "";

    if(source==="tenor"){
        url = `https://tenor.googleapis.com/v2/search?q=${q}&key=${TENOR_KEY}&limit=30`;
    }else{
        url = `https://api.giphy.com/v1/gifs/search?q=${q}&api_key=${GIPHY_KEY}&limit=30`;
    }

    let res = await fetch(url);
    let data = await res.json();

    render(data);
}

// 热门
async function loadTrending(){
    document.getElementById("status").innerText="加载热门...";

    let url = source==="tenor"
        ? `https://tenor.googleapis.com/v2/trending?key=${TENOR_KEY}&limit=30`
        : `https://api.giphy.com/v1/gifs/trending?api_key=${GIPHY_KEY}&limit=30`;

    let res = await fetch(url);
    let data = await res.json();

    render(data);
}

// 渲染
function render(data){
    let grid = document.getElementById("grid");
    grid.innerHTML="";

    let list = source==="tenor" ? data.results : data.data;

    list.forEach(item=>{
        let url = source==="tenor"
            ? item.media_formats.gif.url
            : item.images.fixed_width.url;

        let card = document.createElement("div");
        card.className="card";

        let img = document.createElement("img");
        img.src = url;
        img.loading="lazy";
        img.decoding="async";

        img.onclick=()=>share(url);

        card.appendChild(img);
        grid.appendChild(card);
    });

    document.getElementById("status").innerText=`加载 ${list.length} 个`;
}

// 分享
function share(url){
    if(navigator.share){
        navigator.share({url});
    }else{
        navigator.clipboard.writeText(url);
        alert("已复制链接");
    }
}
</script>

</body>
</html>
