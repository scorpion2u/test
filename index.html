<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎬 GIF 搜索 · 即搜即下</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, sans-serif;
            padding: 20px 16px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            max-width: 1280px;
            width: 100%;
        }

        .header {
            margin-bottom: 28px;
            text-align: center;
        }

        h1 {
            font-weight: 700;
            font-size: 2.2rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .subhead {
            color: #b8b5d9;
            font-weight: 400;
            font-size: 0.95rem;
        }

        .search-section {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 5px 5px 5px 24px;
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            max-width: 600px;
            margin: 0 auto 20px;
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 1.15rem;
            padding: 14px 8px 14px 0;
            color: white;
            outline: none;
        }

        .search-input::placeholder {
            color: #a9a6d9;
        }

        .search-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 12px 26px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .search-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .quick-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.15s;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
        }

        .tag:hover {
            background: #f5576c;
            border-color: #f5576c;
        }

        .status-area {
            text-align: center;
            margin: 15px 0 20px;
            min-height: 32px;
            color: #ddd;
            font-weight: 500;
        }

        .loader {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #f5576c;
            border-radius: 50%;
            animation: spin 0.8s infinite linear;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .gif-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 18px;
            margin-top: 10px;
        }

        .gif-card {
            background: rgba(255,255,255,0.08);
            border-radius: 18px;
            overflow: hidden;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
            cursor: pointer;
        }

        .gif-card:hover {
            transform: translateY(-5px);
            border-color: #f5576c;
            box-shadow: 0 15px 25px -10px rgba(245, 87, 108, 0.3);
        }

        .gif-image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #1a1838;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gif-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-footer {
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .gif-title {
            color: #ddd;
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100px;
        }

        .download-btn {
            background: #f5576c;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }

        .download-btn:hover {
            background: #ff6b81;
        }

        .footer-note {
            margin-top: 40px;
            text-align: center;
            color: #9a97c9;
            font-size: 0.85rem;
        }

        .footer-note a {
            color: #f5576c;
            text-decoration: none;
        }

        .info-badge {
            background: rgba(245, 87, 108, 0.15);
            border-radius: 30px;
            padding: 8px 20px;
            margin-bottom: 8px;
            display: inline-block;
            border: 1px solid rgba(245, 87, 108, 0.3);
        }

        .proxy-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .proxy-btn {
            background: rgba(255,255,255,0.08);
            padding: 6px 14px;
            border-radius: 30px;
            color: #ccc;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.15s;
        }

        .proxy-btn.active {
            background: #f5576c;
            color: white;
            border-color: #f5576c;
        }

        @media (max-width: 500px) {
            h1 { font-size: 1.8rem; }
            .gif-grid { grid-template-columns: repeat(2, 1fr); }
            .search-input { font-size: 1rem; }
        }

        @media (max-width: 380px) {
            .gif-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>
            <span>🎬</span> GIF 搜索 <span>✨</span>
        </h1>
        <div class="subhead">即搜即下 · 发聊天超方便</div>
    </div>

    <div class="search-section">
        <input type="text" class="search-input" id="searchInput" placeholder="输入关键词..." value="cute cat" autofocus>
        <button class="search-btn" id="searchBtn">🔍 搜索</button>
    </div>

    <!-- 快捷标签 -->
    <div class="quick-tags">
        <span class="tag" data-keyword="cute cat">😺 猫咪</span>
        <span class="tag" data-keyword="happy dance">💃 开心舞</span>
        <span class="tag" data-keyword="applause clap">👏 鼓掌</span>
        <span class="tag" data-keyword="thank you">🙏 谢谢</span>
        <span class="tag" data-keyword="celebration">🎉 庆祝</span>
        <span class="tag" data-keyword="funny meme">😂 表情包</span>
        <span class="tag" data-keyword="trending">🔥 热门</span>
    </div>

    <!-- 代理切换（如果某个代理失效可切换）-->
    <div class="proxy-selector">
        <span class="proxy-btn active" data-proxy="corsproxy">代理1</span>
        <span class="proxy-btn" data-proxy="allorigins">代理2</span>
        <span class="proxy-btn" data-proxy="direct">直连</span>
    </div>

    <div class="status-area" id="statusArea"></div>

    <div class="gif-grid" id="gifGrid"></div>

    <div class="footer-note">
        <div class="info-badge">
            ⚡ 点击 GIF 或按钮下载 · 支持切换代理
        </div>
        <div>
            💬 下载后直接拖入聊天框 · 
            <a href="#" id="refreshTrending">🔄 刷新热门</a>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ========== 配置 ==========
        const TENOR_API_KEY = 'LIVDSRZULELA';
        const TENOR_SEARCH_URL = 'https://g.tenor.com/v2/search';
        const TENOR_TRENDING_URL = 'https://g.tenor.com/v2/trending';
        const LIMIT = 24;

        // CORS 代理列表
        const PROXIES = {
            corsproxy: 'https://corsproxy.io/?',
            allorigins: 'https://api.allorigins.win/raw?url=',
            direct: ''
        };

        let currentProxy = 'corsproxy';
        let currentAbortController = null;

        // DOM 元素
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const statusArea = document.getElementById('statusArea');
        const gifGrid = document.getElementById('gifGrid');
        const refreshTrending = document.getElementById('refreshTrending');

        // ========== 辅助函数 ==========
        function setStatus(text, isLoading = false) {
            if (isLoading) {
                statusArea.innerHTML = `<span class="loader"></span> ${text}`;
            } else {
                statusArea.innerHTML = text;
            }
        }

        function clearGrid() {
            gifGrid.innerHTML = '';
        }

        // 带代理的 fetch
        async function fetchWithProxy(url) {
            const proxy = PROXIES[currentProxy];
            const fetchUrl = proxy ? proxy + encodeURIComponent(url) : url;
            
            console.log('请求 URL:', fetchUrl);
            
            const response = await fetch(fetchUrl, { 
                signal: currentAbortController?.signal 
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            return response.json();
        }

        // ========== 下载 GIF ==========
        async function downloadGif(url, filename) {
            try {
                setStatus('📥 正在下载...');
                
                // 下载也尝试使用代理
                let downloadUrl = url;
                if (currentProxy !== 'direct') {
                    downloadUrl = PROXIES[currentProxy] + encodeURIComponent(url);
                }
                
                const response = await fetch(downloadUrl);
                if (!response.ok) throw new Error('网络错误');
                const blob = await response.blob();
                
                const a = document.createElement('a');
                const blobUrl = URL.createObjectURL(blob);
                a.href = blobUrl;
                const cleanName = (filename || 'gif').replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_').substring(0, 30);
                a.download = `${cleanName}_${Date.now()}.gif`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
                
                setStatus('✅ 下载成功！');
                setTimeout(() => setStatus(''), 1500);
            } catch (err) {
                console.warn('下载失败，打开原图:', err);
                window.open(url, '_blank');
                setStatus('💡 请在新标签页长按或右键保存');
                setTimeout(() => setStatus(''), 2000);
            }
        }

        // ========== 渲染 GIF 网格 ==========
        function renderGifs(results, queryTerm = '') {
            clearGrid();
            
            if (!results || results.length === 0) {
                setStatus(`😕 没有找到 "${queryTerm}" 的相关 GIF，换个词试试？`);
                return;
            }
            
            setStatus(`✅ 找到 ${results.length} 个 GIF`);
            
            results.forEach(item => {
                const gifUrl = item.media_formats?.gif?.url || 
                               item.media_formats?.tinygif?.url || 
                               item.media_formats?.mediumgif?.url;
                
                if (!gifUrl) return;
                
                const title = item.content_description || item.title || 'GIF';
                const shortTitle = title.length > 20 ? title.slice(0, 18) + '..' : title;
                
                const card = document.createElement('div');
                card.className = 'gif-card';
                
                const imgWrapper = document.createElement('div');
                imgWrapper.className = 'gif-image-wrapper';
                const img = document.createElement('img');
                img.className = 'gif-img';
                img.src = gifUrl;
                img.alt = title;
                img.loading = 'lazy';
                img.onerror = function() {
                    this.style.backgroundColor = '#2a2848';
                };
                
                imgWrapper.appendChild(img);
                
                const footer = document.createElement('div');
                footer.className = 'card-footer';
                
                const titleSpan = document.createElement('span');
                titleSpan.className = 'gif-title';
                titleSpan.textContent = shortTitle;
                titleSpan.title = title;
                
                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'download-btn';
                downloadBtn.innerHTML = '⬇️ 下载';
                downloadBtn.onclick = (e) => {
                    e.stopPropagation();
                    downloadGif(gifUrl, title);
                };
                
                footer.appendChild(titleSpan);
                footer.appendChild(downloadBtn);
                
                card.appendChild(imgWrapper);
                card.appendChild(footer);
                
                card.onclick = () => downloadGif(gifUrl, title);
                
                gifGrid.appendChild(card);
            });
        }

        // ========== 搜索 GIF ==========
        async function searchGifs(query) {
            const trimmedQuery = query.trim();
            if (!trimmedQuery) {
                searchInput.value = 'cute cat';
                return searchGifs('cute cat');
            }
            
            if (currentAbortController) {
                currentAbortController.abort();
            }
            currentAbortController = new AbortController();
            
            clearGrid();
            setStatus(`🔍 搜索 "${trimmedQuery}" ...`, true);
            
            try {
                const params = new URLSearchParams({
                    key: TENOR_API_KEY,
                    q: trimmedQuery,
                    limit: LIMIT.toString(),
                    media_filter: 'gif',
                    contentfilter: 'medium',
                    locale: 'zh_CN'
                });
                
                const url = `${TENOR_SEARCH_URL}?${params.toString()}`;
                const data = await fetchWithProxy(url);
                
                if (currentAbortController?.signal.aborted) return;
                
                renderGifs(data.results, trimmedQuery);
                
            } catch (error) {
                if (error.name === 'AbortError') return;
                console.error('搜索失败:', error);
                setStatus(`⚠️ 搜索失败，尝试切换代理（点击上方代理1/代理2/直连）`);
            } finally {
                currentAbortController = null;
            }
        }

        // ========== 获取热门 GIF ==========
        async function fetchTrending() {
            if (currentAbortController) {
                currentAbortController.abort();
            }
            currentAbortController = new AbortController();
            
            clearGrid();
            setStatus('🔥 加载热门 GIF ...', true);
            
            try {
                const params = new URLSearchParams({
                    key: TENOR_API_KEY,
                    limit: LIMIT.toString(),
                    media_filter: 'gif',
                    contentfilter: 'medium',
                    locale: 'zh_CN'
                });
                
                const url = `${TENOR_TRENDING_URL}?${params.toString()}`;
                const data = await fetchWithProxy(url);
                
                if (currentAbortController?.signal.aborted) return;
                
                renderGifs(data.results, '热门');
                searchInput.value = '';
                
            } catch (error) {
                if (error.name === 'AbortError') return;
                console.error('获取热门失败:', error);
                setStatus(`⚠️ 加载失败，尝试切换代理`);
            } finally {
                currentAbortController = null;
            }
        }

        // ========== 切换代理 ==========
        function switchProxy(proxyName) {
            currentProxy = proxyName;
            
            // 更新按钮状态
            document.querySelectorAll('.proxy-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.proxy === proxyName) {
                    btn.classList.add('active');
                }
            });
            
            setStatus(`🔄 已切换到 ${proxyName === 'direct' ? '直连' : proxyName}，重新搜索...`, true);
            
            // 重新执行当前搜索
            const currentQuery = searchInput.value.trim();
            if (currentQuery) {
                searchGifs(currentQuery);
            } else {
                fetchTrending();
            }
        }

        // ========== 初始化 ==========
        function init() {
            searchBtn.addEventListener('click', () => {
                searchGifs(searchInput.value);
            });
            
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    searchGifs(searchInput.value);
                }
            });
            
            // 快捷标签
            document.querySelectorAll('.tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    const keyword = tag.dataset.keyword;
                    if (keyword === 'trending') {
                        fetchTrending();
                    } else {
                        searchInput.value = keyword;
                        searchGifs(keyword);
                    }
                });
            });
            
            // 代理切换
            document.querySelectorAll('.proxy-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    switchProxy(btn.dataset.proxy);
                });
            });
            
            refreshTrending.addEventListener('click', (e) => {
                e.preventDefault();
                fetchTrending();
            });
            
            // 页面加载
            window.addEventListener('load', () => {
                setTimeout(() => {
                    searchGifs('cute cat');
                }, 100);
            });
        }

        init();
    })();
</script>
</body>
</html>
