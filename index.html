          <div>
            <div class="export-section-title">💰 收支类型：</div>
            <div class="select-box" id="typeSelect">
              <div class="select-display">
                <span class="text">全部</span>
                <span class="arrow">▼</span>
              </div>
              <div class="select-options">
                <div data-value="all" class="active">全部</div>
                <div data-value="expense">仅支出</div>
                <div data-value="income">仅收入</div>
              </div>
            </div>
          </div>
        </div>
      `;

      const modal = modalManager.create(
        '📤 导出备份',
        html,
        `
          <button id="confirmExport" style="width:100%;padding:12px;background:var(--expense-color);color:white;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px;">确认导出</button>
          <button id="cancelExport" class="btn-cancel">取消</button>
        `
      );

      if (!modal) return;

      let selectedRange = 'month';
      let selectedType = 'all';

      // 通用 select 逻辑
      function setupSelect(boxId, callback) {
        const box = modal.querySelector(boxId);
        const display = box.querySelector('.select-display');
        const textSpan = display.querySelector('.text');
        const arrow = display.querySelector('.arrow');
        const options = box.querySelector('.select-options');
        const optionsDivs = options.querySelectorAll('div');

        // 点击展开/收起
        display.onclick = (e) => {
          e.stopPropagation();
          const isOpen = options.style.display === 'block';
          
          // 关闭其他下拉框
          modal.querySelectorAll('.select-options').forEach(opt => {
            opt.style.display = 'none';
            const parentBox = opt.closest('.select-box');
            if (parentBox) {
              parentBox.querySelector('.arrow').style.transform = 'rotate(0deg)';
            }
          });
          
          if (!isOpen) {
            options.style.display = 'block';
            arrow.style.transform = 'rotate(180deg)';
          } else {
            options.style.display = 'none';
            arrow.style.transform = 'rotate(0deg)';
          }
        };

        // 选项点击
        optionsDivs.forEach(opt => {
          opt.onclick = (e) => {
            e.stopPropagation();
            const value = opt.dataset.value;
            const label = opt.innerText;
            
            // 更新选中状态
            optionsDivs.forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            
            // 更新显示文本
            textSpan.innerText = label;
            
            // 关闭下拉
            options.style.display = 'none';
            arrow.style.transform = 'rotate(0deg)';
            
            // 回调
            callback(value);
          };
        });
      }

      // 初始化选择器
      setupSelect('#rangeSelect', (val) => {
        selectedRange = val;
        const customBox = modal.querySelector('#customBox');
        customBox.style.display = val === 'custom' ? 'flex' : 'none';
      });

      setupSelect('#typeSelect', (val) => {
        selectedType = val;
      });

      // 点击外部关闭下拉框
      modal.addEventListener('click', (e) => {
        if (!e.target.closest('.select-box')) {
          modal.querySelectorAll('.select-options').forEach(opt => {
            opt.style.display = 'none';
            const parentBox = opt.closest('.select-box');
            if (parentBox) {
              parentBox.querySelector('.arrow').style.transform = 'rotate(0deg)';
            }
          });
        }
      });

      // 导出逻辑
      modal.querySelector('#confirmExport').onclick = async () => {
        const range = selectedRange;
        const type = selectedType;

        // 获取数据
        let filtered = await dbManager.getAll('entries');

        // 按范围筛选
        if (range === 'month') {
          const monthStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
          filtered = filtered.filter(e => e.date.startsWith(monthStr));
        } else if (range === 'year') {
          const yearStr = String(currentYear);
          filtered = filtered.filter(e => e.date.startsWith(yearStr));
        } else if (range === 'custom') {
          const start = modal.querySelector('#startDate').value;
          const end = modal.querySelector('#endDate').value;

          if (!start || !end) {
            showToast('请选择日期范围');
            return;
          }

          filtered = filtered.filter(e => e.date >= start && e.date <= end);
        }

        // 按类型筛选
        if (type !== 'all') {
          filtered = filtered.filter(e => e.type === type);
        }

        // 排序
        filtered.sort((a, b) => {
          return new Date(`${b.date} ${b.time || '00:00'}`) -
                 new Date(`${a.date} ${a.time || '00:00'}`);
        });

        if (!filtered.length) {
          showToast('没有符合条件的数据');
          return;
        }

        // 构建导出数据
        const exportData = {
          source: 'main',
          version: '1.0',
          exportDate: new Date().toISOString(),
          entries: filtered,
          expenseCats: expenseCats,
          incomeCats: incomeCats
        };

        // 生成文件名
        let fileName = '记账本备份';
        
        if (range === 'month') {
          const m = String(currentMonth + 1).padStart(2, '0');
          fileName += `_${m}_${currentYear}`;
        } else if (range === 'year') {
          fileName += `_${currentYear}`;
        } else if (range === 'custom') {
          const start = modal.querySelector('#startDate').value;
          const end = modal.querySelector('#endDate').value;
          if (start && end) {
            const format = (d) => {
              const [y, m, day] = d.split('-');
              return `${day}_${m}_${y}`;
            };
            fileName += `_${format(start)}至${format(end)}`;
          } else {
            fileName += '_自定义';
          }
        } else {
          fileName += '_全部记录';
        }

        if (type === 'expense') fileName += '_仅支出';
        if (type === 'income') fileName += '_仅收入';
        
        fileName += '.json';

        // 下载文件
        const blob = new Blob([JSON.stringify(exportData, null, 2)], {
          type: 'application/json'
        });

        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fileName;
        a.click();
        URL.revokeObjectURL(a.href);

        // 保存备份时间
        saveBackupTime();

        showToast(`✅ 已导出 ${filtered.length} 条记录`);
        modalManager.close(modal);
      };

      modal.querySelector('#cancelExport').onclick = () => {
        modalManager.close(modal);
      };
    }

    // 添加保存备份时间的辅助函数
    function saveBackupTime() {
      const now = new Date().toISOString();
      localStorage.setItem('lastBackupTime', now);
      updateBackupStatus(now);
    }

    function updateBackupStatus(lastBackupTime) {
      const now = new Date();
      const last = new Date(lastBackupTime);
      const diffMs = now - last;
      const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      const diffHours = Math.floor(diffMs / (1000 * 60 * 60));

      const el = document.getElementById("backupStatus");
      if (!el) return;

      if (diffDays === 0) {
        if (diffHours === 0) {
          el.innerText = "💾 刚刚备份";
        } else {
          el.innerText = `💾 ${diffHours}小时前备份`;
        }
      } else if (diffDays === 1) {
        el.innerText = "💾 1天前备份";
      } else {
        el.innerText = `💾 ${diffDays}天前备份`;
      }
    }

    // 页面加载时更新备份状态
    window.addEventListener('load', function() {
      const savedBackupTime = localStorage.getItem('lastBackupTime');
      if (savedBackupTime) {
        updateBackupStatus(savedBackupTime);
      } else {
        const el = document.getElementById("backupStatus");
        if (el) el.innerText = "💾 尚未备份";
      }
    });

        );

        const monthOptions = [
          { value: 'all', label: `全部月份 (${data.entries.length}条)` },
          ...monthsInFile.map(month => {
            const count = data.entries.filter(e => e.date.startsWith(month)).length;
            const formatted = `${month.split('-')[1]}/${month.split('-')[0]}`;
            return { value: month, label: `${formatted} (${count}条)` };
          })
        ];
        
        const monthSelect = createCustomSelect(
          modal.querySelector('#importMonthContainer'),
          monthOptions,
          'all',
          () => {}
        );

        modal.querySelector('#confirmImport').onclick = async () => {
          const mode = modeSelect.getValue();
          const selectedMonth = monthSelect.getValue();

          let entriesToImport = [...data.entries];
          if (selectedMonth !== 'all') {
            entriesToImport = entriesToImport.filter(e => e.date.startsWith(selectedMonth));
          }
          
          const MAX_ENTRIES = CONSTANTS.MAX_ENTRIES;
          if (entriesToImport.length > MAX_ENTRIES) {
            entriesToImport.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            entriesToImport = entriesToImport.slice(0, MAX_ENTRIES);
            showToast(`⚠️ 数据超过上限，仅导入最新 ${MAX_ENTRIES} 条`);
          }

          if (entriesToImport.length === 0) {
            showToast('没有符合条件的数据可导入');
            modalManager.close(modal);
            return;
          }

          let importedCount = 0, skippedCount = 0, failedCount = 0;

          if (mode === 'replace') {
            await dbManager.clear('entries');
            const result = await dbManager.putAll('entries', entriesToImport);
            
            importedCount = result.success;
            failedCount = result.failed;
            
            if (result.failed > 0) {
              console.warn('导入失败记录:', result.errors);
              showToast(`⚠️ ${result.failed} 条记录导入失败`);
            }
            
            // 重新加载 entries
            entries = await dbManager.getAll('entries');
            showToast(`✅ 替换完成，成功 ${importedCount} 条` + (failedCount > 0 ? `，失败 ${failedCount} 条` : ''));
          } else {
            const existingIds = new Set(entries.map(e => e.id));
            const newEntries = entriesToImport.filter(e => !existingIds.has(e.id));
            
            skippedCount = entriesToImport.length - newEntries.length;
            
            if (newEntries.length > 0) {
              const result = await dbManager.putAll('entries', newEntries);
              importedCount = result.success;
              failedCount = result.failed;
              
              if (result.failed > 0) {
                console.warn('导入失败记录:', result.errors);
              }
              
              // 只把成功的添加到内存
              const successEntries = newEntries.filter((_, idx) => 
                !result.errors.some(e => e.index === idx)
              );
              entries.push(...successEntries);
            }
            
            let msg = `🔄 合并完成，新增 ${importedCount} 条`;
            if (skippedCount > 0) msg += `，跳过 ${skippedCount} 条重复`;
            if (failedCount > 0) msg += `，失败 ${failedCount} 条`;
            showToast(msg);
          }

          let newExpenseCats = 0, newIncomeCats = 0;
          if (data.expenseCats) {
            for (const cat of data.expenseCats) {
              if (!expenseCats.includes(cat)) {
                expenseCats.push(cat);
                newExpenseCats++;
              }
            }
          }
          if (data.incomeCats) {
            for (const cat of data.incomeCats) {
              if (!incomeCats.includes(cat)) {
                incomeCats.push(cat);
                newIncomeCats++;
              }
            }
          }

          if (newExpenseCats > 0 || newIncomeCats > 0) {
            await saveCategories();
            showToast(`📝 自动添加了 ${newExpenseCats} 个支出分类，${newIncomeCats} 个收入分类`);
          }

          rebuildStatsCache();
          renderCalendar();
          renderEntries();
          renderCategoryDropdown();
          updateInputColor();
          showToast(`🎉 导入完成！当前共 ${entries.length} 条记录`);
          modalManager.close(modal);
        };

        modal.querySelector('#cancelImport').onclick = () => modalManager.close(modal);
      }
    } catch (error) {
      showToast('❌ 文件解析失败：' + error.message);
    }
  };
  fileInput.click();
}

      // ==================== 事件绑定 ====================
      function bindEvents() {
        const amountInput = document.getElementById('amountInput');
        amountInput.addEventListener('input', function() {
  let val = this.value;
  
  // 1. 允许空字符串
  if (val === '') {
    this._lastValid = '';
    updateInputColor();
    return;
  }
  
  // 2. 允许单独的 "." 转为 "0."
  if (val === '.') {
    this.value = '0.';
    this._lastValid = '0.';
    updateInputColor();
    return;
  }
  
  // 3. 保留 "0." 作为合法过渡状态
  if (val === '0.' || val === '0.0') {
    // 如果变成了 "0.0"，保持为 "0."（让用户继续输入）
    if (val === '0.0') {
      this.value = '0.';
    }
    this._lastValid = '0.';
    updateInputColor();
    return;
  }
  
  // 4. 移除非数字和小数点字符
  val = val.replace(/[^\d.]/g, '');
  
  // 5. 确保只有一个小数点
  const dotCount = (val.match(/\./g) || []).length;
  if (dotCount > 1) {
    const firstDotIndex = val.indexOf('.');
    val = val.substring(0, firstDotIndex + 1) + val.substring(firstDotIndex + 1).replace(/\./g, '');
  }
  
  // 6. 限制小数位数不超过 2 位
  const dotIndex = val.indexOf('.');
  if (dotIndex !== -1 && val.length - dotIndex - 1 > 2) {
    val = val.substring(0, dotIndex + 3);
  }
  
  // 7. 处理前导零（保留 "0." 情况）
  if (val.length > 1 && val[0] === '0' && val[1] !== '.') {
    val = val.replace(/^0+/, '');
    // 如果全删完了，给个 "0"
    if (val === '' || val === '.') {
      val = '0' + val;
    }
  }
  
  // 8. 处理以小数点开头的情况（如 ".5" → "0.5"）
  if (val[0] === '.') {
    val = '0' + val;
  }
  
  // 9. 如果只输入了 "0"，保留
  if (val === '0') {
    this.value = val;
    this._lastValid = val;
    updateInputColor();
    return;
  }
  
  // 10. 赋值
  this.value = val;
  this._lastValid = val;
  updateInputColor();
});

        amountInput.addEventListener('focus', function() { this._lastValid = this.value; });
        amountInput.addEventListener('blur', function() {
  const val = this.value.trim();
  
  if (val === '' || val === '0.' || val === '.') {
    this.value = '';
    return;
  }
  
  const num = parseFloat(val);
  if (!isNaN(num) && num > 0) {
    this.value = num.toFixed(2);
  } else if (val === '0') {
    this.value = '';
  }
});

          <div class="settings-item"><label class="settings-label">🎨 收入颜色</label><div class="hsl-group"><div class="hsl-row"><span class="hsl-sub-label">色相</span><input type="range" id="incomeHue" min="0" max="360" step="1" value="${incomeHsl.h}"><div class="color-preview-block" id="incomePreview" style="background:${uiSettings.incomeColor}"></div></div><div class="hsl-row"><span class="hsl-sub-label">饱和度</span><input type="range" id="incomeSat" min="0" max="100" step="1" value="${incomeHsl.s}"></div><div class="hsl-row"><span class="hsl-sub-label">亮度</span><input type="range" id="incomeLight" min="20" max="80" step="1" value="${incomeHsl.l}"></div></div></div>
          <div class="settings-item"><label class="settings-label">🎨 卡片底色</label><div class="hsl-group"><div class="hsl-row"><span class="hsl-sub-label">色相</span><input type="range" id="cardBgHue" min="0" max="360" step="1" value="${cardBgHsl.h}"><div class="color-preview-block" id="cardBgPreview" style="background:${uiSettings.cardBg}"></div></div><div class="hsl-row"><span class="hsl-sub-label">饱和度</span><input type="range" id="cardBgSat" min="0" max="100" step="1" value="${cardBgHsl.s}"></div><div class="hsl-row"><span class="hsl-sub-label">亮度</span><input type="range" id="cardBgLight" min="20" max="100" step="1" value="${cardBgHsl.l}"></div></div></div>
          <div class="settings-item"><label class="settings-label">🎨 页面背景色</label><div class="hsl-group"><div class="hsl-row"><span class="hsl-sub-label">色相</span><input type="range" id="bgHue" min="0" max="360" step="1" value="${bgHsl.h}"><div class="color-preview-block" id="bgPreview" style="background:${uiSettings.bgColor}"></div></div><div class="hsl-row"><span class="hsl-sub-label">饱和度</span><input type="range" id="bgSat" min="0" max="100" step="1" value="${bgHsl.s}"></div><div class="hsl-row"><span class="hsl-sub-label">亮度</span><input type="range" id="bgLight" min="20" max="100" step="1" value="${bgHsl.l}"></div></div></div>
          <div class="settings-item"><label class="settings-label">📏 紧凑度 (卡片间距)</label><input type="range" id="spacingGap" min="6" max="18" step="1" value="${uiSettings.spacingGap}"><div class="settings-value" id="spacingValue">${uiSettings.spacingGap}px</div></div>
          <div class="settings-item"><label class="settings-label">📦 卡片内边距</label><input type="range" id="cardPadding" min="6" max="20" step="1" value="${uiSettings.cardPadding}"><div class="settings-value" id="paddingValue">${uiSettings.cardPadding}px</div></div>
          <div class="settings-item"><label class="settings-label">🔤 字体大小</label><input type="range" id="fontSize" min="12" max="22" step="1" value="${uiSettings.fontSize}"><div class="settings-value" id="fontValue">${uiSettings.fontSize}px</div></div>
          <button class="reset-btn" id="resetSettingsBtn">↺ 恢复默认设置</button>
        `;

        const modal = modalManager.create('🎨 界面设置', html, '<button id="closeSettingsBtn" class="close-btn">关闭</button>');
        if (!modal) return;

        const updateExpense = () => {
          const c = hslToHex(parseInt(modal.querySelector('#expenseHue').value), parseInt(modal.querySelector('#expenseSat').value), parseInt(modal.querySelector('#expenseLight').value));
          modal.querySelector('#expensePreview').style.background = c;
          window._tempColors.expenseColor = c;
        };
        modal.querySelector('#expenseHue').oninput = updateExpense;
        modal.querySelector('#expenseSat').oninput = updateExpense;
        modal.querySelector('#expenseLight').oninput = updateExpense;

        const updateIncome = () => {
          const c = hslToHex(parseInt(modal.querySelector('#incomeHue').value), parseInt(modal.querySelector('#incomeSat').value), parseInt(modal.querySelector('#incomeLight').value));
          modal.querySelector('#incomePreview').style.background = c;
          window._tempColors.incomeColor = c;
        };
        modal.querySelector('#incomeHue').oninput = updateIncome;
        modal.querySelector('#incomeSat').oninput = updateIncome;
        modal.querySelector('#incomeLight').oninput = updateIncome;

        const updateCardBg = () => {
          const c = hslToHex(parseInt(modal.querySelector('#cardBgHue').value), parseInt(modal.querySelector('#cardBgSat').value), parseInt(modal.querySelector('#cardBgLight').value));
          modal.querySelector('#cardBgPreview').style.background = c;
          window._tempColors.cardBg = c;
        };
        modal.querySelector('#cardBgHue').oninput = updateCardBg;
        modal.querySelector('#cardBgSat').oninput = updateCardBg;
        modal.querySelector('#cardBgLight').oninput = updateCardBg;

        const updateBg = () => {
          const c = hslToHex(parseInt(modal.querySelector('#bgHue').value), parseInt(modal.querySelector('#bgSat').value), parseInt(modal.querySelector('#bgLight').value));
          modal.querySelector('#bgPreview').style.background = c;
          window._tempColors.bgColor = c;
        };
        modal.querySelector('#bgHue').oninput = updateBg;
        modal.querySelector('#bgSat').oninput = updateBg;
        modal.querySelector('#bgLight').oninput = updateBg;

        modal.querySelector('#spacingGap').oninput = function() {
          uiSettings.spacingGap = parseInt(this.value);
          modal.querySelector('#spacingValue').innerText = uiSettings.spacingGap + 'px';
          applyUISettings();
        };
        modal.querySelector('#cardPadding').oninput = function() {
          uiSettings.cardPadding = parseInt(this.value);
          modal.querySelector('#paddingValue').innerText = uiSettings.cardPadding + 'px';
          applyUISettings();
        };
        modal.querySelector('#fontSize').oninput = function() {
          uiSettings.fontSize = parseInt(this.value);
          modal.querySelector('#fontValue').innerText = uiSettings.fontSize + 'px';
          applyUISettings();
        };

        modal.querySelector('#resetSettingsBtn').onclick = () => {
          uiSettings = { cardRadius: 24, cardPadding: 16, statPadding: 8, inputPadding: 12, fontSize: 18, expenseColor: '#c2413a', incomeColor: '#2dd4bf', spacingGap: 6, bgColor: '#f1f5f9', cardBg: '#ffffff', darkMode: uiSettings.darkMode };
          applyUISettings();
          modalManager.close(modal);
          openSettingsPanel();
          showToast('已恢复默认设置');
        };

        modal.querySelector('#closeSettingsBtn').onclick = () => {
          if (window._tempColors) {
            if (window._tempColors.expenseColor) uiSettings.expenseColor = window._tempColors.expenseColor;
            if (window._tempColors.incomeColor) uiSettings.incomeColor = window._tempColors.incomeColor;
            if (window._tempColors.cardBg) uiSettings.cardBg = window._tempColors.cardBg;
            if (window._tempColors.bgColor) uiSettings.bgColor = window._tempColors.bgColor;
            saveSettings();
          }
          modalManager.close(modal);
          showToast('设置已保存');
        };
      }

      function initBackToTop() {
        const backTopBtn = document.getElementById('floatBackTop');
        window.addEventListener('scroll', () => {
          if (window.scrollY > 300) backTopBtn.classList.add('show');
          else backTopBtn.classList.remove('show');
        });
        backTopBtn.onclick = () => { window.scrollTo({ top: 0, behavior: 'smooth' }); };
      }

      // ==================== Service Worker 初始化 ====================
      function initServiceWorker() {
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', async () => {
            const basePath = location.pathname.substring(0, location.pathname.lastIndexOf('/') + 1);
            
            try {
              const reg = await navigator.serviceWorker.register(basePath + 'sw.js', { scope: basePath });
              console.log('✅ Service Worker 注册成功，scope:', reg.scope);
              
              setInterval(() => {
                reg.update();
              }, 60 * 60 * 1000);

              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      showToast('🔄 发现新版本，刷新页面后生效');
                    }
                  });
                }
              });
              
            } catch (err) {
              console.warn('⚠️ Service Worker 注册失败，离线功能不可用');
            }
          });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          deferredPrompt = e;
          updateInstallMenuText();
        });

        window.addEventListener('offline', () => {
          showToast('📴 当前处于离线模式');
        });

        window.addEventListener('online', () => {
          showToast('🌐 网络已恢复');
        });
      }

      // ==================== 初始化 ====================
      window.onload = async function() {
        await load();
        rebuildStatsCache();
        bindEvents();
        renderCalendar();
        renderEntries();
        renderCategoryDropdown();
        updateInputColor();
        initBackToTop();
        initServiceWorker();
        updateInstallMenuText();
        
        const savedBackupTime = localStorage.getItem('lastBackupTime');

if (savedBackupTime) {
  updateBackupStatus(savedBackupTime);
} else {
  // 没备份过
  document.getElementById("backupStatus").innerText = "💾 尚未备份";
}
        
        const loadingOverlay = document.getElementById('loadingOverlay');
  if (loadingOverlay) {
    loadingOverlay.style.opacity = '0';
    setTimeout(() => {
      loadingOverlay.style.display = 'none';
    }, 300);
  }
        
        const standaloneQuery = window.matchMedia('(display-mode: standalone)');
        if (standaloneQuery.addEventListener) {
          standaloneQuery.addEventListener('change', () => {
            updateInstallMenuText();
          });
        }
        
        const fullscreenQuery = window.matchMedia('(display-mode: fullscreen)');
        if (fullscreenQuery.addEventListener) {
          fullscreenQuery.addEventListener('change', () => {
            updateInstallMenuText();
          });
        }
        
        document.addEventListener('visibilitychange', () => {
          if (!document.hidden) {
            updateInstallMenuText();
          }
        });
        
        // 页面卸载前清理定时器
window.addEventListener('beforeunload', cleanupTimers);

// 页面隐藏时清理定时器（可选优化）
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    cleanupTimers();
  }
});
        
      };

    })();
    
    function saveBackupTime() {
  const now = new Date().toISOString();
  localStorage.setItem('lastBackupTime', now);
  updateBackupStatus(now);
}
    
    function updateBackupStatus(lastBackupTime) {
  const now = new Date();
  const last = new Date(lastBackupTime);
  const diffMs = now - last;
  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
  const diffHours = Math.floor(diffMs / (1000 * 60 * 60));

  const el = document.getElementById("backupStatus");
  if (!el) return;

  if (diffDays === 0) {
    if (diffHours === 0) {
      el.innerText = "💾 刚刚备份";
    } else {
      el.innerText = `💾 ${diffHours}小时前备份`;
    }
  } else if (diffDays === 1) {
    el.innerText = "💾 1天前备份";
  } else {
    el.innerText = `💾 ${diffDays}天前备份`;
  }
}
  </script>
</body>
</html>
