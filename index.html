<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>表情包搜索 · 终极版</title>

<style>
body {
    background:#0f0c29;
    color:white;
    font-family:sans-serif;
    padding:20px;
}

.search {
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

input {
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:10px;
}

img {
    width:100%;
    border-radius:10px;
    cursor:pointer;
}

.tags {
    margin-bottom:10px;
}

.tag {
    display:inline-block;
    padding:6px 10px;
    background:#222;
    margin:4px;
    border-radius:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>🔥 表情包搜索（终极版）</h2>

<div class="search">
    <input id="q" placeholder="输入关键词..." value="开心">
</div>

<div class="tags">
    <span class="tag" onclick="quick('开心')">开心</span>
    <span class="tag" onclick="quick('谢谢')">谢谢</span>
    <span class="tag" onclick="quick('加油')">加油</span>
    <span class="tag" onclick="quick('生气')">生气</span>
</div>

<div id="status"></div>
<div class="grid" id="grid"></div>

<script>
const TENOR_KEY = "LIVDSRZULELA";
const GIPHY_KEY = "0L3xTl0lJ9lZ4kQqQZ9Q8X5nO3wW2oKk";

// ✅ 本地库（永不失败）
const LOCAL_DB = {
    开心:[
        "https://media.tenor.com/2roX3uxz_68AAAAM/happy.gif",
        "https://media.tenor.com/WsQhZzJQ8pQAAAAM/laugh.gif"
    ],
    谢谢:[
        "https://media.tenor.com/4T7QJZk4jSMAAAAM/thank-you.gif"
    ],
    默认:[
        "https://media.tenor.com/WkZ9Jr6s6p4AAAAM/love.gif"
    ]
};

let timer=null;

// 防抖输入
document.getElementById("q").addEventListener("input", e=>{
    clearTimeout(timer);
    timer=setTimeout(()=>search(),400);
});

// 快捷
function quick(t){
    document.getElementById("q").value=t;
    search();
}

// 超时 fetch
function fetchTimeout(url, t=5000){
    return Promise.race([
        fetch(url),
        new Promise((_,r)=>setTimeout(()=>r("timeout"),t))
    ]);
}

// 主搜索逻辑
async function search(){
    let q=document.getElementById("q").value.trim();
    if(!q) q="默认";

    setStatus("⚡ 本地匹配中...");
    renderLocal(q);

    // ===== API层 =====
    setStatus("🌐 云端搜索中...");

    // Tenor
    try{
        let r=await fetchTimeout(`https://tenor.googleapis.com/v2/search?q=${q}&key=${TENOR_KEY}&limit=20`);
        let j=await r.json();
        if(j.results?.length){
            return renderTenor(j.results);
        }
    }catch(e){console.log("Tenor失败");}

    // Giphy
    try{
        let r=await fetchTimeout(`https://api.giphy.com/v1/gifs/search?q=${q}&api_key=${GIPHY_KEY}&limit=20`);
        let j=await r.json();
        if(j.data?.length){
            return renderGiphy(j.data);
        }
    }catch(e){console.log("Giphy失败");}

    setStatus("⚠️ 已使用本地结果（网络受限）");
}

// ===== 渲染 =====
function renderLocal(q){
    let list = LOCAL_DB[q] || LOCAL_DB["默认"];
    render(list);
}

function renderTenor(list){
    let urls=list.map(i=>i.media_formats?.gif?.url).filter(Boolean);
    render(urls);
    setStatus("✅ Tenor结果");
}

function renderGiphy(list){
    let urls=list.map(i=>i.images?.fixed_width?.url).filter(Boolean);
    render(urls);
    setStatus("✅ Giphy结果");
}

function render(list){
    let grid=document.getElementById("grid");
    grid.innerHTML="";

    list.forEach(url=>{
        let img=document.createElement("img");
        img.src=url;
        img.loading="lazy";
        img.onclick=()=>share(url);
        grid.appendChild(img);
    });
}

// 分享
function share(url){
    if(navigator.share){
        navigator.share({url});
    }else{
        navigator.clipboard.writeText(url);
        alert("已复制");
    }
}

// 状态
function setStatus(t){
    document.getElementById("status").innerText=t;
}

// 启动
window.onload=search;
</script>

</body>
</html>
