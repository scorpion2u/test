<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no">
  <title>多功能PDF工具</title>
  
  <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlBERuW3peWFt+ebkiIsCiAgInNob3J0X25hbWUiOiAiUERGIiwKICAic3RhcnRfdXJsIjogIi4vIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMWUyOTNiIiwKICAidGhlbWVfY29sb3IiOiAiIzFlMjkzYiIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImljb24tMTkyLnBuZyIsCiAgICAgICJzaXplcyI6ICIxOTJ4MTkyIiwKICAgICAgInR5cGUiOiAiaW1hZ2UvcG5nIgogICAgfQogIF0KfQ==">
  
  <meta name="theme-color" content="#1e293b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PDF工具">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js">
  </script>
  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js">
  </script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js">
  </script>
  <style>
    :root {
      --bg-primary: #f5f7fb;
      --bg-secondary: #ffffff;
      --text-primary: #1a2639;
      --text-secondary: #5b677b;
      --border-color: #eef2f6;
      --card-bg: #f9fafc;
      --button-bg: #f8fafc;
      --button-hover: #eef2ff;
      --button-active-bg: #1e293b;
      --button-active-text: white;
      --input-bg: #fff;
      --input-border: #d1d5db;
      --highlight-bg: #fef3c7;
      --highlight-border: #fbbf24;
      --modal-bg: white;
      --shadow: rgba(0, 0, 0, 0.08);
      --menu-hover: rgba(0, 0, 0, 0.03);
    }

    [data-theme="dark"] {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border-color: #334155;
      --card-bg: #1e293b;
      --button-bg: #334155;
      --button-hover: #475569;
      --button-active-bg: #f1f5f9;
      --button-active-text: #0f172a;
      --input-bg: #334155;
      --input-border: #475569;
      --highlight-bg: #422006;
      --highlight-border: #854d0e;
      --modal-bg: #1e293b;
      --shadow: rgba(0, 0, 0, 0.3);
      --menu-hover: rgba(255, 255, 255, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
    }

    .container {
      max-width: 900px;
      width: 100%;
      background: var(--bg-secondary);
      border-radius: 2rem;
      box-shadow: 0 20px 35px var(--shadow);
      padding: 2rem 1.8rem;
      transition: background 0.3s, box-shadow 0.3s;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.3rem;
    }

    .subtitle {
      color: var(--text-secondary);
      margin-bottom: 1.2rem;
      font-size: 0.9rem;
      border-left: 4px solid #3b82f6;
      padding-left: 1rem;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .top-bar .subtitle {
      margin-bottom: 0;
    }

    .menu-container {
      position: relative;
      z-index: 1000;
    }

    .menu-button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--input-border);
      background: var(--button-bg);
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      color: var(--text-primary);
    }

    .menu-button:hover {
      background: var(--button-hover);
    }

    .menu-dropdown {
      position: absolute;
      top: 48px;
      right: 0;
      background: var(--modal-bg);
      border-radius: 16px;
      width: 220px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.15);
      display: none;
      z-index: 1001;
      padding: 4px 0;
      border: 1px solid var(--border-color);
    }

    .menu-dropdown.show {
      display: block;
    }

    .menu-item {
      padding: 12px 16px;
      cursor: pointer;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--border-color);
      transition: background 0.1s;
      user-select: none;
      color: var(--text-primary);
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item:hover {
      background: var(--menu-hover);
    }

    .menu-item:active {
      background: rgba(0, 0, 0, 0.06);
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.6rem;
      margin-bottom: 1.8rem;
    }

    .tool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      padding: 0.8rem 0.5rem;
      border-radius: 1.2rem;
      border: 2px solid transparent;
      background: var(--button-bg);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
      text-align: center;
    }

    .tool-btn .tool-icon {
      font-size: 1.4rem;
      line-height: 1;
    }

    .tool-btn .tool-label {
      font-size: 0.7rem;
      line-height: 1;
    }

    .tool-btn:hover {
      background: var(--button-hover);
      border-color: #c7d2fe;
    }

    .tool-btn.active {
      background: var(--button-active-bg);
      color: var(--button-active-text);
      border-color: var(--button-active-bg);
      box-shadow: 0 4px 12px rgba(30, 41, 59, 0.25);
    }

    .tool-btn.active:hover {
      background: var(--button-active-bg);
    }

    .card {
      background: var(--card-bg);
      border-radius: 1.5rem;
      padding: 1.5rem;
      border: 1px solid var(--border-color);
      transition: background 0.3s;
    }

    .file-area {
      border: 2px dashed #cbd5e1;
      border-radius: 1.2rem;
      padding: 2rem 1rem;
      text-align: center;
      background: var(--input-bg);
      transition: 0.2s;
      margin-bottom: 1rem;
      cursor: pointer;
    }

    .file-area:hover {
      border-color: #3b82f6;
      background: #f8faff;
    }

    .file-area.dragover {
      border-color: #2563eb;
      background: #eef4ff;
    }

    .file-input {
      display: none;
    }

    .file-icon {
      font-size: 2rem;
      margin-bottom: 0.3rem;
    }

    .file-label {
      font-weight: 500;
      color: var(--text-primary);
    }

    .file-hint {
      color: var(--text-secondary);
      font-size: 0.75rem;
      margin-top: 0.2rem;
    }

    .file-list {
      max-height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .file-list-item {
      display: flex;
      align-items: center;
      background: var(--input-bg);
      padding: 0.7rem 1rem;
      border-radius: 1rem;
      border: 1px solid var(--border-color);
      font-size: 0.85rem;
      gap: 0.5rem;
      min-width: 0;
      transition: all 0.2s ease;
      cursor: default;
    }

    .file-list-item.dragging {
      opacity: 0.5;
      transform: scale(0.95);
    }

    .file-list-item.drag-over {
      border-top: 3px solid #3b82f6;
      background: var(--button-hover);
    }

    .file-thumbnail {
      width: 60px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .drag-handle {
      cursor: grab;
      color: #94a3b8;
      font-size: 1.1rem;
      padding: 0 0.2rem;
      user-select: none;
      flex-shrink: 0;
    }

    .file-info {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .file-idx {
      background: #e2e8f0;
      color: #475569;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .file-size {
      font-size: 0.7rem;
      color: var(--text-secondary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      padding: 0.15rem 0.5rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-encrypted {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-ok {
      background: #d1fae5;
      color: #065f46;
    }

    .badge-error {
      background: #fee2e2;
      color: #b91c1c;
    }

    .badge-plain {
      background: #e0e7ff;
      color: #3730a3;
    }

    .file-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
    }

    .pwd-input {
      width: 100px;
      padding: 0.35rem 0.5rem;
      border-radius: 1.5rem;
      border: 1px solid #fbbf24;
      font-size: 0.75rem;
      background: #fffbeb;
      flex-shrink: 0;
    }

    .pwd-input.error {
      border-color: #ef4444 !important;
    }

    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 0.2rem;
      border-radius: 0.5rem;
      flex-shrink: 0;
    }

    .btn-icon:hover {
      background: #fee2e2;
    }

    .btn-retry {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      padding: 0.15rem 0.5rem;
      border-radius: 1rem;
      font-size: 0.65rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    .btn-group {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .btn-primary {
      background: var(--button-active-bg);
      border: none;
      color: var(--button-active-text);
      padding: 0.6rem 1.5rem;
      border-radius: 2rem;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: 0.2s;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-danger {
      background: #dc2626;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .btn-secondary {
      background: var(--button-bg);
      border: 1px solid var(--input-border);
      color: var(--text-primary);
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.85rem;
      transition: 0.2s;
    }

    .btn-secondary:hover {
      background: var(--button-hover);
    }

    .password-section {
      margin-top: 0.8rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      background: var(--highlight-bg);
      padding: 0.7rem 1rem;
      border-radius: 1rem;
      border: 1px solid var(--highlight-border);
    }

    .password-input {
      padding: 0.5rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid var(--input-border);
      flex: 1;
      min-width: 120px;
      background: var(--input-bg);
      color: var(--text-primary);
    }

    .toggle-pwd {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      color: #3b82f6;
    }

    .info-box {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 1rem;
      padding: 0.7rem 1rem;
      margin-top: 0.8rem;
      font-size: 0.8rem;
      color: #1e40af;
      line-height: 1.5;
    }

    .highlight-box {
      background: #fefce8;
      border: 2px solid #facc15;
      border-radius: 1rem;
      padding: 0.8rem;
      margin-top: 0.8rem;
      font-size: 0.8rem;
      display: flex;
      gap: 0.6rem;
      align-items: flex-start;
    }

    .warning-box {
      background: #fef2f2;
      border: 2px solid #fecaca;
      border-radius: 1rem;
      padding: 0.8rem;
      margin-top: 0.8rem;
      font-size: 0.8rem;
      display: none;
      gap: 0.6rem;
      align-items: flex-start;
      color: #b91c1c;
    }

    .progress-bar-wrap {
      width: 100%;
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      margin-top: 0.8rem;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 4px;
      transition: width 0.3s;
      width: 0%;
    }

    .status {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      display: inline-block;
    }

    .status-info {
      color: #2563eb;
      background: #eef4ff;
    }

    .status-warn {
      color: #b45309;
      background: #fffbeb;
    }

    .status-success {
      color: #059669;
      background: #ecfdf5;
    }

    .same-pwd-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.6rem;
      font-size: 0.8rem;
    }

    .same-pwd-row input[type="checkbox"] {
      accent-color: #3b82f6;
    }

    .quality-selector {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 0.8rem;
      flex-wrap: wrap;
      background: var(--button-bg);
      padding: 0.6rem 1rem;
      border-radius: 1rem;
      font-size: 0.8rem;
    }

    .quality-selector label {
      font-weight: 500;
      white-space: nowrap;
    }

    .quality-selector select {
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid var(--input-border);
      font-size: 0.8rem;
      background: var(--input-bg);
      color: var(--text-primary);
    }

    select {
      padding: 0.5rem;
      border-radius: 2rem;
      border: 1px solid var(--input-border);
      font-size: 0.85rem;
      background: var(--input-bg);
      color: var(--text-primary);
    }

    .output-format-row {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 0.8rem;
    }

    .output-format-row label {
      font-weight: 500;
      font-size: 0.85rem;
    }

    .watermark-section {
      margin-top: 0.8rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      background: var(--button-bg);
      padding: 0.7rem 1rem;
      border-radius: 1rem;
    }

    .watermark-section input[type="text"] {
      padding: 0.5rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid var(--input-border);
      flex: 1;
      min-width: 120px;
      background: var(--input-bg);
      color: var(--text-primary);
    }

    .watermark-section input[type="range"] {
      width: 80px;
    }

    .result-card {
      background: var(--button-bg);
      border-radius: 1rem;
      padding: 1rem;
      margin-top: 0.8rem;
      text-align: center;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border-color);
    }

    .result-item:last-child {
      border-bottom: none;
    }

    .result-savings {
      margin-top: 0.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: #059669;
    }

    @media (max-width: 768px) {
      .tools-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 0.4rem;
      }
      .tool-btn {
        padding: 0.6rem 0.3rem;
      }
      .tool-btn .tool-icon {
        font-size: 1.2rem;
      }
      .tool-btn .tool-label {
        font-size: 0.6rem;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 1.2rem 0.8rem;
      }
      .tools-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 0.4rem;
      }
      .tool-btn {
        padding: 0.6rem 0.3rem;
      }
      .tool-btn .tool-icon {
        font-size: 1.2rem;
      }
      .tool-btn .tool-label {
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>📄 PDF工具箱</h1>
      <div class="menu-container" id="menuContainer">
        <button class="menu-button" id="menuButton" aria-label="菜单">☰</button>
        <div class="menu-dropdown" id="menuDropdown">
          <div class="menu-item" id="themeToggleItem">🌓 切换主题</div>
          <div class="menu-item" id="historyMenuItem">📜 操作历史</div>
          <div class="menu-item" id="installAppBtn">📱 安装应用</div>
          <div class="menu-item" id="languageMenuItem">🌐 语言 / Language</div>
        </div>
      </div>
    </div>
    <div class="subtitle">多功能PDF处理工具</div>

    <div class="tools-grid" id="toolsGrid">
      <button class="tool-btn active" data-tool="removePassword"><span class="tool-icon">🔓</span><span class="tool-label">删除密码</span></button>
      <button class="tool-btn" data-tool="split"><span class="tool-icon">✂️</span><span class="tool-label">拆分PDF</span></button>
      <button class="tool-btn" data-tool="merge"><span class="tool-icon">🔗</span><span class="tool-label">合并PDF</span></button>
      <button class="tool-btn" data-tool="compress"><span class="tool-icon">📦</span><span class="tool-label">压缩PDF</span></button>
      <button class="tool-btn" data-tool="extract"><span class="tool-icon">🖼️</span><span class="tool-label">提取图片</span></button>
      <button class="tool-btn" data-tool="extractPages"><span class="tool-icon">📑</span><span class="tool-label">提取页面</span></button>
      <button class="tool-btn" data-tool="pdfToImages"><span class="tool-icon">🔄</span><span class="tool-label">PDF转图片</span></button>
      <button class="tool-btn" data-tool="imagesToPdf"><span class="tool-icon">📸</span><span class="tool-label">图片转PDF</span></button>
      <button class="tool-btn" data-tool="watermark"><span class="tool-icon">💧</span><span class="tool-label">添加水印</span></button>
      <button class="tool-btn" data-tool="organize"><span class="tool-icon">🗂️</span><span class="tool-label">整理页面</span></button>
    </div>

    <div class="card" id="toolCard"></div>
    <div id="statusArea" style="text-align: center;"></div>
  </div>

  <script>
    (function() {
      // 设置 PDF.js worker
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

      // ==================== 多语言 ====================
      const LANGUAGES = {
        'zh-CN': {
          menuTitle: '📄 PDF工具箱',
          subtitle: '多功能PDF处理工具',
          merge: '合并PDF',
          split: '拆分PDF',
          removePassword: '删除密码',
          compress: '压缩PDF',
          extract: '提取图片',
          extractPages: '提取页面',
          pdfToImages: 'PDF转图片',
          imagesToPdf: '图片转PDF',
          organize: '整理页面',
          watermark: '添加水印',
          installApp: '📱 安装应用',
          language: '🌐 语言 / Language',
          themeToggle: '🌓 切换主题',
          history: '📜 操作历史',
          installedApp: '✅ 已安装应用',
          addToHome: '📱 添加到主屏幕',
          selectFile: '选择一个PDF文件',
          selectFiles: '选择要合并的PDF文件（可多选）',
          supportMulti: '支持多选，可拖拽排序',
          supportSingle: '选择一个文件',
          samePassword: '所有加密PDF使用相同密码',
          passwordLabel: '🔑 统一密码：',
          passwordSingle: '🔑 密码：',
          passwordPlaceholder: '输入密码',
          show: '👁️',
          hide: '🙈',
          startMerge: '🔗 开始合并',
          clearList: '清空列表',
          splitMode: '拆分方式：',

      function detectBrowserLanguage() {
        const lang = (navigator.language || navigator.userLanguage || 'zh-CN').toLowerCase();
        if (lang.startsWith('zh')) return 'zh-CN';
        return 'en-US';
      }

      let currentLang = detectBrowserLanguage();
      try {
        const saved = localStorage.getItem('pdf-tool-lang');
        if (saved && LANGUAGES[saved]) currentLang = saved;
      } catch (e) {}

      function t(key) {
        return LANGUAGES[currentLang]?.[key] || LANGUAGES['zh-CN'][key] || key;
      }

      // ==================== 历史记录 ====================
      class HistoryManager {
        constructor() {
          this.key = 'pdf-tool-history';
          this.maxItems = 20;
        }
        getHistory() {
          try {
            return JSON.parse(localStorage.getItem(this.key) || '[]');
          } catch {
            return [];
          }
        }
        addEntry(entry) {
          const history = this.getHistory();
          history.unshift({
            ...entry,
            timestamp: Date.now(),
            id: Date.now().toString(36) + Math.random().toString(36).substr(2),
          });
          if (history.length > this.maxItems) {
            history.length = this.maxItems;
          }
          try {
            localStorage.setItem(this.key, JSON.stringify(history));
          } catch (e) {}
        }
        clearHistory() {
          try {
            localStorage.removeItem(this.key);
          } catch (e) {}
        }
      }

      const historyManager = new HistoryManager();

      // ==================== 主题 ====================
      function initTheme() {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
        const savedTheme = localStorage.getItem('pdf-tool-theme');
        if (savedTheme) {
          document.documentElement.setAttribute('data-theme', savedTheme);
        } else if (prefersDark.matches) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
        prefersDark.addEventListener('change', (e) => {
          if (!localStorage.getItem('pdf-tool-theme')) {
            document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
          }
        });
      }

      function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try {
          localStorage.setItem('pdf-tool-theme', next);
        } catch (e) {}
      }

      function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
      }

      function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      // ==================== 所有功能函数 ====================
      async function checkEncrypted(file) {
        try {
          await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
          return false;
        } catch (e) {
          return !!(e.name === 'PasswordException' || (e.message && e.message.includes('password')));
        }
      }

      async function renderThumbnail(file, password) {
        password = password || '';
        var cacheKey = file.name + '_' + file.size + '_' + password;
        if (pageThumbnails[cacheKey]) return pageThumbnails[cacheKey];
        try {
          var arrayBuf = await file.arrayBuffer();
          var pdf = await pdfjsLib.getDocument({ data: arrayBuf, password: password || undefined }).promise;
          var page = await pdf.getPage(1);
          var viewport = page.getViewport({ scale: 0.5 });
          var canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
          var dataUrl = canvas.toDataURL('image/jpeg', 0.7);
          pageThumbnails[cacheKey] = dataUrl;
          return dataUrl;
        } catch (e) {
          return null;
        }
      }

      async function renderPdfToImages(file, password, options) {
        password = password || '';
        options = options || {};
        var scale = options.scale || 2.0;
        var quality = options.quality || 0.92;
        var arrayBuf = await file.arrayBuffer();
        var loadingTask = pdfjsLib.getDocument({ data: arrayBuf, password: password || undefined });
        return new Promise(function(resolve, reject) {
          loadingTask.onPassword = function(_, reason) {
            if (reason === 1) reject(new Error('NEED_PASSWORD'));
            else if (reason === 2) reject(new Error('INCORRECT_PASSWORD'));
          };
          loadingTask.promise.then(async function(pdf) {
            var pages = [];
            for (var i = 1; i <= pdf.numPages; i++) {
              var page = await pdf.getPage(i);
              var vp = page.getViewport({ scale: scale });
              var canvas = document.createElement('canvas');
              canvas.width = vp.width;
              canvas.height = vp.height;
              await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
              var blob = await new Promise(function(r) { canvas.toBlob(r, 'image/jpeg', quality); });
              pages.push({ width: vp.width, height: vp.height, data: await blob.arrayBuffer(), blob: blob });
            }
            resolve(pages);
          }).catch(function(err) {
            if (err.name === 'PasswordException') reject(new Error('INCORRECT_PASSWORD'));
            else reject(err);
          });
        });
      }

      async function createPdfFromImages(pageImages) {
        var doc = await PDFLib.PDFDocument.create();
        for (var i = 0; i < pageImages.length; i++) {
          var img = pageImages[i];
          var jpg;
          if (img.data instanceof ArrayBuffer) {
            jpg = await doc.embedJpg(img.data);
          } else if (img.blob) {
            jpg = await doc.embedJpg(await img.blob.arrayBuffer());
          }
          var page = doc.addPage([img.width, img.height]);
          page.drawImage(jpg, { x: 0, y: 0, width: img.width, height: img.height });
        }
        return await doc.save();
      }

      async function processPdf(file, password) {
        password = password || '';
        var needsPwd = await checkEncrypted(file);
        if (needsPwd && !password) throw new Error('NEED_PASSWORD');
        var options = getRenderOptions();
        return { pageImages: await renderPdfToImages(file, password, options), isEncrypted: needsPwd };
      }

      async function extractImages(file, password) {
        password = password || '';
        var arrayBuf = await file.arrayBuffer();
        var loadingTask = pdfjsLib.getDocument({ data: arrayBuf, password: password || undefined });
        return new Promise(function(resolve, reject) {
          loadingTask.onPassword = function(_, reason) {
            if (reason === 1) reject(new Error('NEED_PASSWORD'));
            else if (reason === 2) reject(new Error('INCORRECT_PASSWORD'));
          };
          loadingTask.promise.then(async function(pdf) {
            var images = [];
            for (var p = 1; p <= pdf.numPages; p++) {
              var page = await pdf.getPage(p);
              var ops = await page.getOperatorList();
              for (var i = 0; i < ops.fnArray.length; i++) {
                if (ops.fnArray[i] === pdfjsLib.OPS.paintImageXObject || ops.fnArray[i] === pdfjsLib.OPS.paintInlineImageXObject) {
                  try {
                    var imgData = await page.objs.get(ops.argsArray[i][0]);
                    if (imgData && imgData.data) {
                      var canvas = document.createElement('canvas');
                      canvas.width = imgData.width;
                      canvas.height = imgData.height;
                      var ctx = canvas.getContext('2d');
                      var id = ctx.createImageData(imgData.width, imgData.height);
                      id.data.set(imgData.data);
                      ctx.putImageData(id, 0, 0);
                      var blob = await new Promise(function(r) { canvas.toBlob(r, 'image/png'); });
                      images.push({ blob: blob, pageNum: p, index: images.length + 1 });
                    }
                  } catch (e) {}
                }
              }
            }
            resolve(images);
          }).catch(function(err) {
            if (err.name === 'PasswordException') reject(new Error('INCORRECT_PASSWORD'));
            else reject(err);
          });
        });
      }

      function getRenderOptions() {
        var scaleEl = document.getElementById('renderScale');
        var qualityEl = document.getElementById('jpegQuality');
        var scale = scaleEl ? parseFloat(scaleEl.value) : 2.0;
        var quality = qualityEl ? parseFloat(qualityEl.value) : 0.92;
        return { scale: scale, quality: quality };
      }

      function isSamePasswordMode() {
        var c = document.getElementById('samePwdCheck');
        return c ? c.checked : true;
      }

      function getPasswordForFile(idx) {
        if (isSamePasswordMode()) {
          var gp = document.getElementById('globalPassword');
          return gp ? gp.value : '';
        }
        return fileEntries[idx] ? (fileEntries[idx].password || '') : '';
      }

      function parseRange(s, total) {
        var set = new Set();
        if (!s.trim()) {
          var arr = [];
          for (var i = 0; i < total; i++) arr.push(i);
          return arr;
        }
        var parts = s.split(',');
        for (var j = 0; j < parts.length; j++) {
          var p = parts[j].trim();
          if (p.includes('-')) {
            var ab = p.split('-');
            var a = Number(ab[0]);
            var b = Number(ab[1]);
            for (var k = a; k <= b; k++) {
              if (k >= 1 && k <= total) set.add(k - 1);
            }
          } else {
            var n = Number(p);
            if (n >= 1 && n <= total) set.add(n - 1);
          }
        }
        var result = [];
        set.forEach(function(v) { result.push(v); });
        return result.sort(function(a, b) { return a - b; });
      }

      function download(blob, name) {
        var reader = new FileReader();
        reader.onload = function() {
          var a = document.createElement('a');
          a.href = reader.result;
          a.download = name;
          a.style.display = 'none';
          document.body.appendChild(a);
          a.click();
          setTimeout(function() {
            document.body.removeChild(a);
          }, 200);
        };
        reader.onerror = function() {
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = name;
          a.style.display = 'none';
          document.body.appendChild(a);
          a.click();
          setTimeout(function() {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          }, 200);
        };
        reader.readAsDataURL(blob);
      }

      async function downloadMultipleAsZip(blobs, zipName) {
        if (typeof JSZip === 'undefined') {
          for (var i = 0; i < blobs.length; i++) {
            download(blobs[i].blob, blobs[i].name);
          }
          return;
        }
        var zip = new JSZip();
        for (var j = 0; j < blobs.length; j++) {
          zip.file(blobs[j].name, blobs[j].blob);
        }
        var zipBlob = await zip.generateAsync({ type: 'blob' });
        download(zipBlob, zipName);
      }

      async function jpegToPng(jpegBlob) {
        return new Promise(function(resolve) {
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            canvas.getContext('2d').drawImage(img, 0, 0);
            canvas.toBlob(resolve, 'image/png');
          };
          img.src = URL.createObjectURL(jpegBlob);
        });
      }

      function degreesToRadians(degrees) {
        return degrees * (Math.PI / 180);
      }

      function showDownloadResult(originalSize, newSize) {
        var savings = ((1 - newSize / originalSize) * 100).toFixed(1);
        var savedBytes = originalSize - newSize;
        var html = '<div class="result-card">';
        html += '<div class="result-item"><span>📄 ' + t('originalSize') + '</span><strong>' + formatFileSize(originalSize) + '</strong></div>';
        html += '<div class="result-item"><span>📦 ' + t('newSize') + '</span><strong>' + formatFileSize(newSize) + '</strong></div>';
        if (savedBytes > 0) {
          html += '<div class="result-savings">🎉 ' + t('saved') + ' ' + formatFileSize(savedBytes) + ' (' + savings + '%)</div>';
        }
        html += '</div>';
        statusArea.innerHTML += html;
      }

      function handleError(err, idx) {
        var entry = fileEntries[idx];
        if (!entry) return;
        if (err.message === 'NEED_PASSWORD') {
          entry.status = 'error';
          setStatus('⚠️ ' + t('needPassword') + ': "' + escapeHtml(entry.file.name) + '"', 'warn');
        } else if (err.message === 'INCORRECT_PASSWORD') {
          entry.status = 'error';
          setStatus('❌ ' + t('wrongPassword') + ': "' + escapeHtml(entry.file.name) + '"', 'warn');
        } else {
          setStatus('❌ ' + err.message, 'warn');
        }
        renderFileList();
      }

      // ==================== 文件列表渲染 ====================
      async function renderFileList() {
        var listDiv = document.getElementById('fileAreaList');
        if (!listDiv) return;
        if (!fileEntries.length) {
          listDiv.innerHTML = '';
          updatePasswordUI();
          return;
        }
        if (currentTool !== 'imagesToPdf') {
          for (var i = 0; i < fileEntries.length; i++) {
            var e = fileEntries[i];
            if (e.encrypted === undefined) {
              e.encrypted = await checkEncrypted(e.file);
            }
          }
        }
        updatePasswordUI();
        var useSame = isSamePasswordMode();
        var itemsHtml = '';
        for (var idx = 0; idx < fileEntries.length; idx++) {
          var entry = fileEntries[idx];
          var isImg = currentTool === 'imagesToPdf';
          var sBadge = entry.status === 'ok' ? '<span class="badge badge-ok">✅</span>' : entry.status === 'error' ? '<span class="badge badge-error">❌</span>' : '';
          var eBadge = '';
          if (!isImg) {
            eBadge = entry.encrypted ? '<span class="badge badge-encrypted">🔒</span>' : '<span class="badge badge-plain">📄</span>';
          }
          var thumbnailHtml = '';
          if (!isImg && !entry.encrypted) {
            var thumbDataUrl = await renderThumbnail(entry.file, entry.password || getPasswordForFile(idx));
            if (thumbDataUrl) {
              thumbnailHtml = '<img src="' + thumbDataUrl + '" class="file-thumbnail" alt="预览">';
            }
          }
          var pwdHtml = '';
          if (!isImg && entry.encrypted && !useSame) {
            pwdHtml = '<input type="password" class="pwd-input' + (entry.status === 'error' ? ' error' : '') + '" value="' + escapeHtml(entry.password || '') + '" data-idx="' + idx + '" placeholder="' + t('passwordPlaceholder') + '">';
            if (entry.status === 'error') pwdHtml += '<button class="btn-retry" data-idx="' + idx + '">🔄</button>';
          } else if (!isImg && entry.encrypted && entry.status === 'error' && useSame) {
            pwdHtml = '<button class="btn-retry" data-idx="' + idx + '">🔄</button>';
          }
          itemsHtml += '<div class="file-list-item" draggable="true" data-idx="' + idx + '"><span class="drag-handle">⠿</span>' + thumbnailHtml + '<div class="file-info"><span class="file-idx">' + (idx + 1) + '</span><span class="file-name">' + (isImg ? '🖼️' : '📄') + ' ' + escapeHtml(entry.file.name) + '</span><span class="file-size">(' + (entry.file.size / 1024).toFixed(0) + 'KB)</span>' + eBadge + sBadge + '</div><div class="file-actions">' + pwdHtml + '<button class="btn-icon remove-btn" data-idx="' + idx + '">✕</button></div></div>';
        }
        listDiv.innerHTML = itemsHtml;
        bindListEvents(listDiv);
      }

      function bindListEvents(list) {
        if (!list) return;
        var removeBtns = list.querySelectorAll('.remove-btn');
        for (var i = 0; i < removeBtns.length; i++) {
          removeBtns[i].onclick = function(e) {
            e.stopPropagation();
            var idx = parseInt(this.dataset.idx);
            fileEntries.splice(idx, 1);
            pageThumbnails = {};
            renderFileList();
          };
        }
        var pwdInputs = list.querySelectorAll('.pwd-input');
        for (var j = 0; j < pwdInputs.length; j++) {
          pwdInputs[j].oninput = function() {
            var idx = parseInt(this.dataset.idx);
            fileEntries[idx].password = this.value;
            if (fileEntries[idx].status === 'error') {
              fileEntries[idx].status = undefined;
              pageThumbnails = {};
              renderFileList();
            }
          };
        }
        var retryBtns = list.querySelectorAll('.btn-retry');
        for (var k = 0; k < retryBtns.length; k++) {
          retryBtns[k].onclick = function() {
            var idx = parseInt(this.dataset.idx);
            fileEntries[idx].status = undefined;
            pageThumbnails = {};
            renderFileList();
            executeAction(idx);
          };
        }
        setupDragSort(list);
      }

      function setupDragSort(list) {
        var dragIdx = null;
        var items = list.querySelectorAll('.file-list-item');
        for (var i = 0; i < items.length; i++) {
          var item = items[i];
          item.addEventListener('dragstart', function() {
            dragIdx = parseInt(this.dataset.idx);
            this.classList.add('dragging');
          });
          item.addEventListener('dragend', function() {
            this.classList.remove('dragging');
            var allItems = list.querySelectorAll('.file-list-item');
            for (var j = 0; j < allItems.length; j++) {
              allItems[j].classList.remove('drag-over');
            }
          });
          item.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.classList.add('drag-over');
          });
          item.addEventListener('dragleave', function() {
            this.classList.remove('drag-over');
          });
          item.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            var dropIdx = parseInt(this.dataset.idx);
            if (dragIdx !== null && dragIdx !== dropIdx) {
              var moved = fileEntries.splice(dragIdx, 1)[0];
              fileEntries.splice(dropIdx, 0, moved);
              pageThumbnails = {};
              renderFileList();
            }
          });
        }
      }

      function updatePasswordUI() {
        var hasEnc = false;
        for (var i = 0; i < fileEntries.length; i++) {
          if (fileEntries[i].encrypted) {
            hasEnc = true;
            break;
          }
        }
        var useSame = isSamePasswordMode();
        var gs = document.getElementById('globalPwdSection');
        var sr = document.getElementById('samePwdRow');
        if (gs) gs.style.display = (hasEnc && useSame && currentTool !== 'imagesToPdf') ? 'flex' : 'none';
        if (sr) sr.style.display = (hasEnc && fileEntries.length > 1 && multiFileTools.indexOf(currentTool) !== -1) ? 'flex' : 'none';
      }

      function attachEvents() {
        var area = document.getElementById('fileArea');
        var input = document.getElementById('fileAreaInput');
        if (area && input) {
          area.onclick = function() { input.click(); };
          area.ondragover = function(e) {
            e.preventDefault();
            area.classList.add('dragover');
          };
          area.ondragleave = function() { area.classList.remove('dragover'); };
          area.ondrop = function(e) {
            e.preventDefault();
            area.classList.remove('dragover');
            var fs = Array.from(e.dataTransfer.files).filter(function(f) {
              if (currentTool === 'imagesToPdf') return f.type.startsWith('image/');
              return f.type === 'application/pdf' || f.name.endsWith('.pdf');
            });
            if (fs.length) {
              if (multiFileTools.indexOf(currentTool) === -1) fileEntries = [];
              for (var i = 0; i < fs.length; i++) {
                fileEntries.push({ file: fs[i], password: '', status: undefined, encrypted: undefined });
              }
              pageThumbnails = {};
              renderFileList();
            }
          };
          input.onchange = function() {
            var fs = Array.from(input.files);
            if (multiFileTools.indexOf(currentTool) === -1) fileEntries = [];
            for (var i = 0; i < fs.length; i++) {
              fileEntries.push({ file: fs[i], password: '', status: undefined, encrypted: undefined });
            }
            pageThumbnails = {};
            input.value = '';
            renderFileList();
          };
        }
        var clearBtn = document.getElementById('clearBtn');
        if (clearBtn) {
          clearBtn.addEventListener('click', function() {
            fileEntries = [];
            pageThumbnails = {};
            renderFileList();
          });
        }
        var samePwdCheck = document.getElementById('samePwdCheck');
        if (samePwdCheck) {
          samePwdCheck.addEventListener('change', function() {
            pageThumbnails = {};
            renderFileList();
          });
        }
        var toggleBtns = document.querySelectorAll('.toggle-pwd');
        for (var i = 0; i < toggleBtns.length; i++) {
          toggleBtns[i].onclick = function() {
            var tg = document.getElementById(this.dataset.target);
            if (tg) {
              tg.type = tg.type === 'password' ? 'text' : 'password';
              this.textContent = tg.type === 'password' ? t('show') : t('hide');
            }
          };
        }
        var splitMode = document.getElementById('splitMode');
        if (splitMode) {
          splitMode.addEventListener('change', function(e) {
            var w = document.getElementById('rangeInputWrap');
            if (w) w.style.display = e.target.value === 'range' ? 'block' : 'none';
          });
        }
        var compressMode = document.getElementById('compressMode');
        if (compressMode) {
          compressMode.addEventListener('change', function(e) {
            var warn = document.getElementById('rasterizeWarning');
            var bal = document.getElementById('balancedSettings');
            if (warn) warn.style.display = e.target.value === 'rasterize' ? 'flex' : 'none';
            if (bal) bal.style.display = e.target.value === 'balanced' ? 'block' : 'none';
          });
        }
        var actionBtn = document.getElementById('actionBtn');
        if (actionBtn) {
          actionBtn.addEventListener('click', function() { executeAction(0); });
        }
      }

      async function executeAction(startIdx) {
        startIdx = startIdx || 0;
        if (!fileEntries.length) {
          setStatus(t('noFile'), 'warn');
          return;
        }
        try {
          if (currentTool === 'merge') {
            await doMerge(startIdx);
          } else if (currentTool === 'split') {
            await doSplit();
          } else if (currentTool === 'removePassword') {
            await doRemovePassword(startIdx);
          } else if (currentTool === 'compress') {
            await doCompress();
          } else if (currentTool === 'extract') {
            await doExtract();
          } else if (currentTool === 'extractPages') {
            await doExtractPages();
          } else if (currentTool === 'pdfToImages') {
            await doPdfToImages();
          } else if (currentTool === 'imagesToPdf') {
            await doImagesToPdf();
          } else if (currentTool === 'watermark') {
            await doWatermark();
          } else if (currentTool === 'organize') {
            await doOrganize();
          }
        } catch (err) {
          setStatus('❌ ' + err.message, 'warn');
        }
      }

      async function doMerge(startIdx) {
        if (fileEntries.length < 2) {
          setStatus(t('atLeast2'), 'warn');
          return;
        }
        var allImages = [];
        var totalSize = 0;
        for (var i = 0; i < fileEntries.length; i++) {
          totalSize += fileEntries[i].file.size;
        }
        for (var i = startIdx; i < fileEntries.length; i++) {
          setProgress((i / fileEntries.length) * 100, t('processing') + ' ' + fileEntries[i].file.name);
          try {
            var result = await processPdf(fileEntries[i].file, getPasswordForFile(i));
            allImages = allImages.concat(result.pageImages);
            fileEntries[i].status = 'ok';
          } catch (err) {
            handleError(err, i);
            return;
          }
        }
        setProgress(100, t('generating'));
        var pdfBytes = await createPdfFromImages(allImages);
        var blob = new Blob([pdfBytes], { type: 'application/pdf' });
        showDownloadResult(totalSize, blob.size);
        download(blob, 'merged.pdf');
        for (var i = 0; i < fileEntries.length; i++) {
          fileEntries[i].status = undefined;
        }
        setStatus('✅ ' + t('mergeSuccess') + ' (' + allImages.length + t('pages') + ')', 'success');
        historyManager.addEntry({ toolIcon: '🔗', toolName: t('merge') });
        renderFileList();
      }

      async function doSplit() {
        var result = await processPdf(fileEntries[0].file, getPasswordForFile(0));
        var pageImages = result.pageImages;
        var mode = document.getElementById('splitMode');
        mode = mode ? mode.value : 'pages';
        var totalSize = fileEntries[0].file.size;
        var outputSize = 0;
        if (mode === 'pages') {
          var blobs = [];
          for (var i = 0; i < pageImages.length; i++) {
            setProgress((i / pageImages.length) * 100);
            var pdfBytes = await createPdfFromImages([pageImages[i]]);
            var blob = new Blob([pdfBytes], { type: 'application/pdf' });
            blobs.push({ blob: blob, name: 'page_' + (i + 1) + '.pdf' });
            outputSize += blob.size;
          }
          if (pageImages.length > 1) {
            await downloadMultipleAsZip(blobs, 'split_pages.zip');
          } else {
            download(blobs[0].blob, blobs[0].name);
          }
          showDownloadResult(totalSize, outputSize);
        } else {
          var rangeInput = document.getElementById('rangeInput');
          var indices = parseRange(rangeInput ? rangeInput.value : '', pageImages.length);
          if (!indices.length) {
            setStatus(t('invalidRange'), 'warn');
            return;
          }
          var selectedImages = [];
          for (var i = 0; i < indices.length; i++) {
            selectedImages.push(pageImages[indices[i]]);
          }
          var pdfBytes = await createPdfFromImages(selectedImages);
          var blob = new Blob([pdfBytes], { type: 'application/pdf' });
          showDownloadResult(totalSize, blob.size);
          download(blob, 'split.pdf');
        }
        setStatus('✅ ' + t('splitSuccess'), 'success');
        historyManager.addEntry({ toolIcon: '✂️', toolName: t('split') });
      }

      async function doRemovePassword(startIdx) {
        var totalSize = 0;
        for (var i = 0; i < fileEntries.length; i++) {
          totalSize += fileEntries[i].file.size;
        }
        var outputSize = 0;
        var blobs = [];
        for (var i = startIdx; i < fileEntries.length; i++) {
          setProgress((i / fileEntries.length) * 100, t('processing') + ' ' + fileEntries[i].file.name);
          try {
            var result = await processPdf(fileEntries[i].file, getPasswordForFile(i));
            var pdfBytes = await createPdfFromImages(result.pageImages);
            var blob = new Blob([pdfBytes], { type: 'application/pdf' });
            var name = fileEntries[i].file.name.replace(/\.pdf$/i, '') + '_no_password.pdf';
            blobs.push({ blob: blob, name: name });
            outputSize += blob.size;
            fileEntries[i].status = 'ok';
          } catch (err) {
            handleError(err, i);
            return;
          }
        }
        if (blobs.length > 1) {
          await downloadMultipleAsZip(blobs, 'unlocked_files.zip');
        } else {
          download(blobs[0].blob, blobs[0].name);
        }
        showDownloadResult(totalSize, outputSize);
        for (var i = 0; i < fileEntries.length; i++) {
          fileEntries[i].status = undefined;
        }
        setStatus('✅ ' + t('extractSuccess'), 'success');
        historyManager.addEntry({ toolIcon: '🔓', toolName: t('removePassword') });
        renderFileList();
      }

      async function doCompress() {
        setProgress(0, t('processing'));
        var result = await processPdf(fileEntries[0].file, getPasswordForFile(0));
        var pdfBytes = await createPdfFromImages(result.pageImages);
        var blob = new Blob([pdfBytes], { type: 'application/pdf' });
        showDownloadResult(fileEntries[0].file.size, blob.size);
        download(blob, 'compressed.pdf');
        setStatus('✅ ' + t('compressSuccess'), 'success');
        historyManager.addEntry({ toolIcon: '📦', toolName: t('compress') });
      }

      async function doExtract() {
        var images = await extractImages(fileEntries[0].file, getPasswordForFile(0));
        if (!images.length) {
          setStatus(t('noFile'), 'warn');
          return;
        }
        if (images.length === 1) {
          download(images[0].blob, 'image.png');
        } else if (typeof JSZip !== 'undefined') {
          var zip = new JSZip();
          for (var i = 0; i < images.length; i++) {
            zip.file('page' + images[i].pageNum + '_' + images[i].index + '.png', images[i].blob);
          }
          var zipBlob = await zip.generateAsync({ type: 'blob' });
          download(zipBlob, 'images.zip');
        } else {
          for (var i = 0; i < images.length; i++) {
            download(images[i].blob, 'page' + images[i].pageNum + '_' + images[i].index + '.png');
          }
        }
        setStatus('✅ ' + t('extractSuccess') + ' (' + images.length + ')', 'success');
        historyManager.addEntry({ toolIcon: '🖼️', toolName: t('extract') });
      }

      async function doExtractPages() {
        setProgress(0, t('processing'));
        var result = await processPdf(fileEntries[0].file, getPasswordForFile(0));
        var rangeStr = document.getElementById('extractRange');
        rangeStr = rangeStr ? rangeStr.value : '';
        var indices = parseRange(rangeStr, result.pageImages.length);
        if (!indices.length) {
          setStatus(t('pleaseEnterRange'), 'warn');
          return;
        }
        var selectedImages = [];
        for (var i = 0; i < indices.length; i++) {
          selectedImages.push(result.pageImages[indices[i]]);
        }
        var pdfBytes = await createPdfFromImages(selectedImages);
        download(new Blob([pdfBytes], { type: 'application/pdf' }), 'extracted_pages.pdf');
        setStatus('✅ ' + t('extractSuccess') + ' (' + indices.length + t('pages') + ')', 'success');
        historyManager.addEntry({ toolIcon: '📑', toolName: t('extractPages') });
      }

      async function doPdfToImages() {
        setProgress(0, t('processing'));
        var options = getRenderOptions();
        var result = await processPdf(fileEntries[0].file, getPasswordForFile(0));
        var formatEl = document.getElementById('outputFormat');
        var format = formatEl ? formatEl.value : 'jpeg';
        var zipEl = document.getElementById('zipDownload');
        var useZip = zipEl ? zipEl.checked : false;
        if (result.pageImages.length === 1 && !useZip) {
          var blob = format === 'png' ? await jpegToPng(result.pageImages[0].blob) : result.pageImages[0].blob;
          download(blob, 'page_1.' + format);
        } else if (useZip && typeof JSZip !== 'undefined') {
          var zip = new JSZip();
          for (var i = 0; i < result.pageImages.length; i++) {
            setProgress((i / result.pageImages.length) * 100);
            var blob = format === 'png' ? await jpegToPng(result.pageImages[i].blob) : result.pageImages[i].blob;
            zip.file('page_' + (i + 1) + '.' + format, blob);
          }
          download(await zip.generateAsync({ type: 'blob' }), 'pdf_images.zip');
        } else {
          var blobs = [];
          for (var i = 0; i < result.pageImages.length; i++) {
            setProgress((i / result.pageImages.length) * 100);
            var blob = format === 'png' ? await jpegToPng(result.pageImages[i].blob) : result.pageImages[i].blob;
            blobs.push({ blob: blob, name: 'page_' + (i + 1) + '.' + format });
          }
          await downloadMultipleAsZip(blobs, 'pdf_images.zip');
        }
        setStatus('✅ ' + t('convertSuccess') + ' (' + result.pageImages.length + ')', 'success');
        historyManager.addEntry({ toolIcon: '🔄', toolName: t('pdfToImages') });
      }

      async function doImagesToPdf() {
        if (fileEntries.length === 0) {
          setStatus(t('noFile'), 'warn');
          return;
        }
        setProgress(0, t('processing'));
        var pageSizeEl = document.getElementById('pageSize');
        var pageSize = pageSizeEl ? pageSizeEl.value : 'auto';
        var fitModeEl = document.getElementById('fitMode');
        var fitMode = fitModeEl ? fitModeEl.value : 'fit';
        var pageDims = { a4: [595, 842], letter: [612, 792] };
        var doc = await PDFLib.PDFDocument.create();
        for (var i = 0; i < fileEntries.length; i++) {
          setProgress((i / fileEntries.length) * 100, t('processing') + ' ' + fileEntries[i].file.name);
          var buf = await fileEntries[i].file.arrayBuffer();
          var ext = fileEntries[i].file.name.split('.').pop().toLowerCase();
          var img;
          if (ext === 'png') {
            img = await doc.embedPng(buf);
          } else if (ext === 'jpg' || ext === 'jpeg') {
            img = await doc.embedJpg(buf);
          } else {
            try { img = await doc.embedPng(buf); } catch (e) { img = await doc.embedJpg(buf); }
          }
          var pw, ph;
          if (pageSize === 'auto') {
            pw = img.width;
            ph = img.height;
          } else {
            pw = pageDims[pageSize][0];
            ph = pageDims[pageSize][1];
          }
          var page = doc.addPage([pw, ph]);
          var dw = img.width,
            dh = img.height;
          if (fitMode === 'fit') {
            var s = Math.min(pw / img.width, ph / img.height);
            dw = img.width * s;
            dh = img.height * s;
          } else if (fitMode === 'fill') {
            var s = Math.max(pw / img.width, ph / img.height);
            dw = img.width * s;
            dh = img.height * s;
          }
          page.drawImage(img, { x: (pw - dw) / 2, y: (ph - dh) / 2, width: dw, height: dh });
          fileEntries[i].status = 'ok';
        }
        var pdfBytes = await doc.save();
        download(new Blob([pdfBytes], { type: 'application/pdf' }), 'images_to_pdf.pdf');
        for (var i = 0; i < fileEntries.length; i++) {
          fileEntries[i].status = undefined;
        }
        setStatus('✅ ' + t('composeSuccess') + ' (' + fileEntries.length + ')', 'success');
        historyManager.addEntry({ toolIcon: '📸', toolName: t('imagesToPdf') });
        renderFileList();
      }

      async function doWatermark() {
        if (!fileEntries.length) {
          setStatus(t('noFile'), 'warn');
          return;
        }
        setProgress(0, t('processing'));
        var watermarkTextEl = document.getElementById('watermarkText');
        var watermarkText = watermarkTextEl ? watermarkTextEl.value : '机密';
        var opacityEl = document.getElementById('watermarkOpacity');
        var opacity = opacityEl ? parseFloat(opacityEl.value) : 0.2;
        var arrayBuf = await fileEntries[0].file.arrayBuffer();
        var pdfDoc = await PDFLib.PDFDocument.load(arrayBuf, { ignoreEncryption: true });
        var pages = pdfDoc.getPages();
        var font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
        for (var i = 0; i < pages.length; i++) {
          setProgress((i / pages.length) * 100);
          var page = pages[i];
          var size = page.getSize();
          var width = size.width;
          var height = size.height;
          var fontSize = Math.min(width, height) * 0.08;
          page.drawText(watermarkText, {
            x: width / 2 - (watermarkText.length * fontSize * 0.3),
            y: height / 2,
            size: fontSize,
            font: font,
            color: PDFLib.rgb(0.6, 0.6, 0.6),
            opacity: opacity,
            rotate: degreesToRadians(-45),
          });
        }
        var pdfBytes = await pdfDoc.save();
        download(new Blob([pdfBytes], { type: 'application/pdf' }), fileEntries[0].file.name.replace(/\.pdf$/i, '') + '_watermarked.pdf');
        setStatus('✅ ' + t('watermarkSuccess'), 'success');
        historyManager.addEntry({ toolIcon: '💧', toolName: t('watermark') });
      }

      async function doOrganize() {
        if (!fileEntries.length) {
          setStatus(t('noFile'), 'warn');
          return;
        }
        setProgress(0, t('processing'));
        var result = await processPdf(fileEntries[0].file, getPasswordForFile(0));
        var pdfBytes = await createPdfFromImages(result.pageImages);
        download(new Blob([pdfBytes], { type: 'application/pdf' }), 'organized.pdf');
        setStatus('✅ ' + t('organizeSuccess') + ' (' + result.pageImages.length + t('pages') + ')', 'success');
        historyManager.addEntry({ toolIcon: '🗂️', toolName: t('organize') });
      }

      // ==================== 模态框 ====================
      function showModal(title, html, showClose) {
        if (showClose === undefined) showClose = true;
        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10000;display:flex;align-items:center;justify-content:center;';
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        var bgColor = isDark ? '#1e293b' : 'white';
        var textColor = isDark ? '#f1f5f9' : '#1a2639';
        overlay.innerHTML = '<div style="background:' + bgColor + ';border-radius:20px;padding:24px;max-width:420px;width:90%;color:' + textColor + ';"><h3 style="margin-bottom:12px;">' + title + '</h3>' + html + (showClose ? '<button id="modalCloseBtn" style="margin-top:12px;width:100%;padding:10px;border:none;border-radius:20px;background:#1e293b;color:white;cursor:pointer;font-size:0.9rem;">' + t('gotIt') + '</button>' : '') + '</div>';
        document.body.appendChild(overlay);
        var closeBtn = overlay.querySelector('#modalCloseBtn');
        if (closeBtn) {
          closeBtn.onclick = function() { overlay.remove(); };
        }
        overlay.onclick = function(e) {
          if (e.target === overlay) overlay.remove();
        };
        return overlay;
      }

      function installPWA() {
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
          showModal(t('installTitle'), '<div style="text-align:center;padding:12px;"><div style="font-size:40px;">📱</div><p>' + t('usingInstalled') + '</p><p style="font-size:0.8rem;color:#64748b;">' + t('runningStandalone') + '</p></div>');
          return;
        }
        if (!window._deferredPrompt) {
          var ua = navigator.userAgent;
          var b = 'other';
          if (/Edg/.test(ua)) b = 'edge';
          else if (/Chrome/.test(ua) && /Google Inc/.test(navigator.vendor)) b = 'chrome';
          else if (/Safari/.test(ua) && !/Chrome/.test(ua)) b = 'safari';
          else if (/iPhone|iPad|iPod/.test(ua)) b = 'ios';
          var h = '';
          if (b === 'chrome' || b === 'edge') {
            h = '<p style="font-weight:500;">' + t('chromeSteps') + '</p><p>1. ' + t('step1chrome') + '</p><p>2. ' + t('step2chrome') + '</p>';
          } else if (b === 'ios' || b === 'safari') {
            h = '<p style="font-weight:500;">' + t('iosSteps') + '</p><p>1. ' + t('step1ios') + '</p><p>2. ' + t('step2ios') + '</p>';
          } else {
            h = '<p>' + t('browserNotSupport') + '</p><p style="font-size:0.8rem;">' + t('suggestBrowser') + '</p>';
          }
          showModal(t('installTitle'), h);
          return;
        }
        window._deferredPrompt.prompt();
        window._deferredPrompt = null;
        updateMenuLanguage();
      }

      function showLanguageSelector() {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        var bgColor = isDark ? '#1e293b' : 'white';
        var textColor = isDark ? '#f1f5f9' : '#1a2639';
        var btnBg = isDark ? '#334155' : '#f1f5f9';
        var btnText = isDark ? '#f1f5f9' : '#1a2639';
        var html = '<div style="margin-bottom:12px;padding:10px;background:rgba(0,0,0,0.04);border-radius:12px;text-align:center;"><div style="font-size:0.8rem;color:#64748b;">' + t('currentLanguage') + '</div><div style="font-size:1.2rem;font-weight:600;">' + (currentLang === 'zh-CN' ? '简体中文' : 'English') + '</div></div>';
        html += '<div style="display:flex;flex-direction:column;gap:8px;">';
        html += '<div class="lopt" data-l="zh-CN" style="padding:14px;border-radius:12px;cursor:pointer;border:2px solid ' + (currentLang === 'zh-CN' ? '#1e293b' : 'transparent') + ';background:' + (currentLang === 'zh-CN' ? 'rgba(30,41,59,0.05)' : 'rgba(0,0,0,0.02)') + ';">🇨🇳 ' + t('simplifiedChinese') + ' ' + (currentLang === 'zh-CN' ? '✓' : '') + '</div>';
        html += '<div class="lopt" data-l="en-US" style="padding:14px;border-radius:12px;cursor:pointer;border:2px solid ' + (currentLang === 'en-US' ? '#1e293b' : 'transparent') + ';background:' + (currentLang === 'en-US' ? 'rgba(30,41,59,0.05)' : 'rgba(0,0,0,0.02)') + ';">🇺🇸 ' + t('english') + ' ' + (currentLang === 'en-US' ? '✓' : '') + '</div>';
        html += '</div>';
        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10000;display:flex;align-items:center;justify-content:center;';
        overlay.innerHTML = '<div style="background:' + bgColor + ';border-radius:20px;padding:24px;max-width:380px;width:90%;color:' + textColor + ';"><h3 style="margin-bottom:12px;">' + t('selectLanguage') + '</h3>' + html + '<button id="lclose" style="margin-top:12px;width:100%;padding:10px;border:none;border-radius:20px;background:' + btnBg + ';color:' + btnText + ';cursor:pointer;">' + t('close') + '</button></div>';
        document.body.appendChild(overlay);
        var lopts = overlay.querySelectorAll('.lopt');
        for (var i = 0; i < lopts.length; i++) {
          lopts[i].onclick = function() {
            var nl = this.dataset.l;
            if (nl !== currentLang) {
              currentLang = nl;
              try { localStorage.setItem('pdf-tool-lang', nl); } catch (e) {}
              updateAllTexts();
            }
            overlay.remove();
          };
        }
        overlay.querySelector('#lclose').onclick = function() { overlay.remove(); };
        overlay.onclick = function(e) {
          if (e.target === overlay) overlay.remove();
        };
      }

      function showHistory() {
        var history = historyManager.getHistory();
        if (!history.length) {
          var html = '<div style="text-align:center;padding:20px;color:var(--text-secondary);">📜 ' + t('noHistory') + '</div>';
          showModal(t('history'), html);
          return;
        }
        var itemsHtml = '';
        var limit = Math.min(history.length, 10);
        for (var i = 0; i < limit; i++) {
          var h = history[i];
          var date = new Date(h.timestamp);
          var timeStr = (date.getMonth() + 1) + '/' + date.getDate() + ' ' + date.getHours() + ':' + String(date.getMinutes()).padStart(2, '0');
          var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          var borderColor = isDark ? '#334155' : '#e5e7eb';
          itemsHtml += '<div style="padding:10px;border-bottom:1px solid ' + borderColor + ';display:flex;justify-content:space-between;align-items:center;"><div><span>' + (h.toolIcon || '📄') + '</span> ' + (h.toolName || '') + '</div><div style="font-size:0.75rem;color:var(--text-secondary);">' + timeStr + '</div></div>';
        }
        var html = '<div style="max-height:300px;overflow-y:auto;margin-bottom:12px;">' + itemsHtml + '</div><button id="clearHistoryBtn" style="width:100%;padding:10px;border:none;border-radius:20px;background:#dc2626;color:white;cursor:pointer;">' + t('clearHistory') + '</button>';
        var overlay = showModal(t('history'), html, false);
        var clearBtn = overlay.querySelector('#clearHistoryBtn');
        if (clearBtn) {
          clearBtn.onclick = function() {
            historyManager.clearHistory();
            overlay.remove();
            showHistory();
          };
        }
      }

      function updateAllTexts() {
        document.querySelector('h1').textContent = t('menuTitle');
        document.querySelector('.subtitle').textContent = t('subtitle');
        var labels = ['removePassword', 'split', 'merge', 'compress', 'extract', 'extractPages', 'pdfToImages', 'imagesToPdf', 'watermark', 'organize'];
        var labelEls = document.querySelectorAll('.tool-btn .tool-label');
        for (var i = 0; i < labelEls.length; i++) {
          if (i < labels.length) labelEls[i].textContent = t(labels[i]);
        }
        updateMenuLanguage();
        renderToolUI();
      }

      function updateMenuLanguage() {
        var ib = document.getElementById('installAppBtn');
        if (ib) {
          var isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
          ib.textContent = isPWA ? t('installedApp') : (window._deferredPrompt ? t('installApp') : t('addToHome'));
        }
        var lb = document.getElementById('languageMenuItem');
        if (lb) lb.textContent = t('language');
        var hi = document.getElementById('historyMenuItem');
        if (hi) hi.textContent = t('history');
        var tt = document.getElementById('themeToggleItem');
        if (tt) tt.textContent = t('themeToggle');
      }

      // ==================== 菜单事件 ====================
      document.getElementById('menuButton').addEventListener('click', function(e) {
        e.stopPropagation();
        var dd = document.getElementById('menuDropdown');
        if (dd.classList.contains('show')) {
          dd.classList.remove('show');
        } else {
          dd.classList.add('show');
        }
      });

      document.addEventListener('click', function(e) {
        if (!e.target.closest('#menuContainer')) {
          var dd = document.getElementById('menuDropdown');
          if (dd) dd.classList.remove('show');
        }
      });

      document.getElementById('themeToggleItem').addEventListener('click', function() {
        document.getElementById('menuDropdown').classList.remove('show');
        toggleTheme();
      });

      document.getElementById('historyMenuItem').addEventListener('click', function() {
        document.getElementById('menuDropdown').classList.remove('show');
        showHistory();
      });

      document.getElementById('installAppBtn').addEventListener('click', function() {
        document.getElementById('menuDropdown').classList.remove('show');
        installPWA();
      });

      document.getElementById('languageMenuItem').addEventListener('click', function() {
        document.getElementById('menuDropdown').classList.remove('show');
        showLanguageSelector();
      });

      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window._deferredPrompt = e;
        updateMenuLanguage();
      });

      // ==================== 初始化 ====================
      initTheme();
      updateAllTexts();
    })();
  </script>
</body>
</html>
