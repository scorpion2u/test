<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>经期小助手</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --card-radius: 20px;
            --card-padding: 12px;
            --stat-padding: 8px;
            --input-padding: 8px;
            --font-size-base: 15px;
            --expense-color: #e46b5a;
            --income-color: #b5838a;
            --predict-color: #9b6b9e;
            --spacing-gap: 8px;
            --bg-color: #fff5f0;
            --card-bg: #ffffff;
            --focus-color: #e46b5a;
            --text-primary: #4a2a2a;
            --text-secondary: #a07a6a;
            --border-light: #ffe0d4;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, sans-serif;
            background: var(--bg-color);
            padding: 10px;
            display: flex;
            justify-content: center;
            transition: all 0.2s ease;
            color: var(--text-primary);
            min-height: 100vh;
            font-size: var(--font-size-base);
        }

        .container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
            padding-bottom: 20px;
        }

        .stat-card, .calendar-card, .list-card, .date-header {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            border: 1px solid var(--border-light);
            margin-bottom: var(--spacing-gap);
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
        }

        /* 动画装饰卡片 */
        .deco-card {
            background: linear-gradient(135deg, rgba(228, 107, 90, 0.08), rgba(181, 131, 138, 0.08));
            border-radius: var(--card-radius);
            padding: 12px 16px;
            margin-bottom: var(--spacing-gap);
            border: 1px solid rgba(228, 107, 90, 0.2);
            position: relative;
            z-index: 1;
            overflow: visible;
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        
        .sakura-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            border-radius: var(--card-radius);
        }
        
        .today-status {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        
        .status-icon {
            font-size: 32px;
            animation: gentleBounce 3s ease-in-out infinite;
        }
        
        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        
        .status-text {
            flex: 1;
        }
        
        .status-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--expense-color);
            margin-bottom: 4px;
        }
        
        .status-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.4;
        }
        
        .menu-container {
            position: relative;
            z-index: 10;
        }
        
        .menu-button {
            width: 36px;
            height: 36px;
            background: rgba(228, 107, 90, 0.2);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            color: var(--expense-color);
            font-weight: 500;
            position: relative;
            z-index: 11;
        }
        
        .menu-button:active { 
            transform: scale(0.94);
            background: rgba(228, 107, 90, 0.35);
        }
        
        .menu-dropdown {
            position: fixed;
            width: 220px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15), 0 4px 10px rgba(0,0,0,0.08);
            overflow: hidden;
            z-index: 99999;
            display: none;
            backdrop-filter: none;
            opacity: 1;
            animation: menuFadeIn 0.18s ease;
        }
        
        @keyframes menuFadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .menu-dropdown.show { 
            display: block;
        }
        
        .menu-item {
            padding: 14px 16px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #ffffff;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: background 0.15s;
            cursor: pointer;
        }
        
        .menu-item:last-child {
            border-bottom: none;
        }
        
        .menu-item:active {
            background: rgba(0,0,0,0.06);
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }
        .stat-card {
            text-align: center;
            padding: 10px 4px;
        }
        .stat-label {
            font-size: 0.75em;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .stat-number {
            font-size: 1.1em;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--text-primary);
        }
        .stat-card.period .stat-number { color: var(--expense-color); }
        .stat-card.cycle .stat-number { color: var(--income-color); }
        .stat-card.predict .stat-number { color: var(--predict-color); font-size: 14px; }

        .date-header {
            padding: 10px 12px;
        }
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .nav-btn {
            background: rgba(0,0,0,0.05);
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 34px;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.1s;
        }
        .nav-btn:active { transform: scale(0.94); background: rgba(0,0,0,0.1); }
        #currentYearMonthDisplay {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
            background: rgba(0,0,0,0.03);
            padding: 4px 14px;
            border-radius: 34px;
        }
        .selected-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
            flex-wrap: wrap;
            gap: 5px;
        }
        .selected-label {
            font-size: 11px;
            background: rgba(0,0,0,0.05);
            padding: 3px 10px;
            border-radius: 30px;
            color: var(--text-secondary);
        }
        .selected-amount {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .tip-banner {
            background: rgba(228, 107, 90, 0.1);
            border-radius: 20px;
            padding: 4px 8px;
            font-size: 10px;
            color: var(--expense-color);
            text-align: center;
            margin-top: 6px;
        }

        .calendar-card {
            padding: 10px;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 5px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.02);
            border-radius: 14px;
            cursor: pointer;
            font-size: 13px;
            border: 1px solid transparent;
            transition: all 0.1s;
            position: relative;
            min-height: 42px;
        }
        .calendar-day:active { transform: scale(0.96); }
        .calendar-day.other-month { opacity: 0.4; background: transparent; }
        .calendar-day.today {
            border: 2px solid var(--expense-color);
            background: rgba(228, 107, 90, 0.1);
        }
        .calendar-day.selected {
            border: 2px solid #b5838a;
            background: rgba(181, 131, 138, 0.15);
        }
        .calendar-day.predict {
            background: rgba(155, 107, 158, 0.1);
            border: 1px dashed var(--predict-color);
        }
        .day-number {
            font-weight: 500;
            font-size: 13px;
        }
        .period-dot {
            width: 6px;
            height: 6px;
            background: var(--expense-color);
            border-radius: 10px;
            margin-top: 2px;
        }
        .predict-dot {
            width: 6px;
            height: 6px;
            background: var(--predict-color);
            border-radius: 10px;
            margin-top: 2px;
            opacity: 0.7;
        }
        .day-note {
            font-size: 8px;
            color: var(--text-secondary);
            margin-top: 2px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 2px;
        }

        .list-card {
            padding: 10px 12px;
            margin-bottom: 0;
        }
        .entries-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .entries-header h4 { 
            font-size: 13px; 
            font-weight: 600; 
        }
        .entries-list { 
            list-style: none; 
            max-height: 180px;
            overflow-y: auto;
        }
        .entries-list li {
            background: rgba(0,0,0,0.02);
            border-radius: 14px;
            padding: 8px 10px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-light);
        }
        .entry-info { flex: 1; }
        .entry-note { 
            font-weight: 500; 
            font-size: 0.9em; 
        }
        .entry-time { 
            font-size: 9px; 
            color: var(--text-secondary); 
            margin-top: 2px; 
        }
        .entry-actions { display: flex; gap: 8px; align-items: center; }
        .edit-btn, .delete-btn { 
            cursor: pointer; 
            font-size: 13px; 
            opacity: 0.6; 
            padding: 3px;
        }
        .empty-state { 
            text-align: center; 
            color: var(--text-secondary); 
            padding: 20px; 
            font-size: 11px; 
        }

        .action-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-radius: 24px 24px 0 0;
            padding: 16px 20px 24px;
            animation: slideUp 0.3s ease;
            z-index: 1001;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            border-top: 1px solid var(--border-light);
        }
        .action-sheet-title {
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 12px;
        }
        .action-btn {
            width: 100%;
            padding: 12px;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.1s;
            margin-bottom: 8px;
        }
        .action-btn.primary {
            background: var(--expense-color);
            color: white;
        }
        .action-btn.secondary {
            background: rgba(0,0,0,0.05);
            color: var(--text-primary);
        }
        .action-btn.danger {
            color: var(--expense-color);
        }
        .action-btn:active { transform: scale(0.98); opacity: 0.8; }
        
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(3px);
        }
        .settings-panel, .edit-panel, .category-manager, .knowledge-panel {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            width: 90%;
            max-width: 380px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid var(--border-light);
        }
        .knowledge-panel h3 {
            margin-bottom: 16px;
            color: var(--expense-color);
            font-size: 1.2rem;
        }
        .knowledge-section {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-light);
        }
        .knowledge-section h4 {
            font-size: 0.95rem;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .knowledge-section p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 6px;
        }
        .knowledge-tip {
            background: rgba(228, 107, 90, 0.1);
            padding: 8px 12px;
            border-radius: 16px;
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--expense-color);
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c2c2c;
            color: white;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 11px;
            z-index: 1100;
            animation: fadeInOut 2s ease;
            white-space: nowrap;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }
        
        .settings-item {
            margin-bottom: 14px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 10px;
        }
        .settings-label {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
            color: var(--text-primary);
        }
        .theme-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .theme-btn {
            flex: 1;
            min-width: 60px;
            padding: 5px;
            border-radius: 30px;
            border: none;
            background: rgba(0,0,0,0.05);
            font-size: 0.65rem;
            cursor: pointer;
        }
        .hsl-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 5px;
        }
        .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
}

.slider-row input[type="range"] {
    flex: 1;
}

.slider-row span {
    width: 40px;
    text-align: right;
    font-size: 12px;
    color: var(--text-secondary);
}
        .hsl-sub-label { width: 40px; font-size: 0.65rem; }
        input[type="range"] { flex: 1; }
        .color-preview-block {
            width: 28px;
            height: 28px;
            border-radius: 14px;
            border: 1px solid #ddd;
        }
        .reset-btn, .close-settings-btn {
            background: rgba(0,0,0,0.05);
            border: none;
            padding: 7px;
            border-radius: 30px;
            width: 100%;
            margin-top: 6px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .category-list-item {
            display: flex;
            justify-content: space-between;
            padding: 7px;
            border-bottom: 1px solid var(--border-light);
        }
        .delete-cat-btn {
            background: #ffe0d4;
            border: none;
            padding: 2px 8px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.65rem;
        }
        .add-cat-input {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }
        .add-cat-input input {
            flex: 1;
            padding: 5px;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            font-size: 0.75rem;
        }
        button { font-family: inherit; }
    </style>
    <link rel="manifest" href="./manifest.json">
<script>
// 注册 Service Worker（放在所有其他 script 之前）
if ('serviceWorker' in navigator) {
  fetch('./sw.js', { method: 'HEAD' })
    .then(res => {
      if (res.ok) {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('✅ SW 注册成功', reg))
          .catch(err => console.log('❌ SW 注册失败', err));
      } else {
        console.log('⚠️ sw.js 文件不存在，跳过注册');
      }
    })
    .catch(() => console.log('⚠️ 无法检查 sw.js，跳过注册'));
}
</script>
</head>
<body>
<div class="container">
    <div class="stats-row">
        <div class="stat-card period">
            <div class="stat-label">🌸 本月经期</div>
            <div class="stat-number" id="monthPeriodDays">0天</div>
        </div>
        <div class="stat-card cycle">
            <div class="stat-label">📅 平均周期</div>
            <div class="stat-number" id="avgCycleDays">--天</div>
        </div>
        <div class="stat-card predict">
            <div class="stat-label">🔮 下次经期</div>
            <div class="stat-number" id="nextPeriodDate">--</div>
        </div>
    </div>

    <div class="deco-card" id="decoCard">
        <canvas id="sakuraCanvas" class="sakura-canvas"></canvas>
        <div class="today-status" id="todayStatus">
            <div class="status-icon" id="statusIcon">🌸</div>
            <div class="status-text">
                <div class="status-title" id="statusTitle">今日状态</div>
                <div class="status-desc" id="statusDesc">点击日期开始记录</div>
            </div>
        </div>
        <div class="menu-container">
            <div class="menu-button" id="menuButton">☰</div>
            <div class="menu-dropdown" id="menuDropdown">
                <div class="menu-item" id="knowledgeMenuItem">📚 科普资料</div>
                <div class="menu-item" id="settingsMenuItem">🎨 主题·界面设置</div>
                <div class="menu-item" id="exportMenuItem">📤 导出备份</div>
                <div class="menu-item" id="importMenuItem">📥 导入备份</div>
                <div class="menu-item" id="clearAllDataBtn">🗑️ 清除所有数据</div>
                <div class="menu-item" id="manageSymptomsBtn">📝 管理症状标签</div>
            </div>
        </div>
    </div>

    <div class="date-header">
        <div class="calendar-nav">
            <button class="nav-btn" id="prevMonthBtn">←</button>
            <div id="currentYearMonthDisplay"></div>
            <button class="nav-btn" id="nextMonthBtn">→</button>
        </div>
        <div class="selected-row">
            <div class="selected-label" id="selectedDateLabel">点击日期查看详情</div>
            <div class="selected-amount" id="selectedDateInfo">📝 无备注</div>
        </div>
        <div class="tip-banner">
            💡经期预测必须有两个月经期记录，日历上的紫色虚线为预测日。
        </div>
    </div>

    <div class="calendar-card" id="calendarTouchArea">
        <div class="weekdays"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="list-card">
        <div class="entries-header">
            <h4>📋 当日经期备注</h4>
        </div>
        <ul class="entries-list" id="entriesList"></ul>
    </div>
</div>

<script>
    const STORAGE_KEY = 'menstrual_pro_data';
    const SYMPTOMS_KEY = 'menstrual_symptoms_list';
    const SETTINGS_KEY = 'menstrual_ui_settings';

    let menstrualData = {};
    let symptomsList = ['痛经', '量多', '量少', '腰酸', '头痛', '情绪低落', '疲劳', '正常'];
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let selectedDate = getTodayStr();
    let touchStartX = 0;
    let sakuraAnimation = null;

    let uiSettings = {
        cardRadius: 20,
        cardPadding: 12,
        fontSize: 15,
        expenseColor: '#e46b5a',
        incomeColor: '#b5838a',
        predictColor: '#9b6b9e',
        spacingGap: 8,
        bgColor: '#fff5f0',
        cardBg: '#ffffff',
    };

    const FEM_THEMES = {
        '🌸 蜜桃甜心': { expense: '#e46b5a', income: '#b5838a', bg: '#fff5f0', cardBg: '#ffffff' },
        '💜 薰衣草梦': { expense: '#b980ea', income: '#9b6b9e', bg: '#faf5ff', cardBg: '#ffffff' },
        '🌹 复古玫瑰': { expense: '#c44c5c', income: '#b97f6e', bg: '#fef2f0', cardBg: '#fffaf7' },
        '🍃 清新薄荷': { expense: '#5f9e8e', income: '#78b0a0', bg: '#f0f7f4', cardBg: '#ffffff' },
        '🌙 温柔月晕': { expense: '#e0a3a0', income: '#c2a1a5', bg: '#fffbf5', cardBg: '#ffffff' }
    };

    class SakuraPetal {
        constructor(canvas, width, height) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
            this.width = width;
            this.height = height;
            this.reset();
        }
        reset() {
            this.x = Math.random() * this.width;
            this.y = Math.random() * -this.height;
            this.size = 6 + Math.random() * 8;
            this.speedY = 0.8 + Math.random() * 1.5;
            this.speedX = -0.3 + Math.random() * 0.6;
            this.rotation = Math.random() * Math.PI * 2;
            this.rotationSpeed = -0.02 + Math.random() * 0.04;
            this.opacity = 0.4 + Math.random() * 0.5;
        }
        update() {
            this.y += this.speedY;
            this.x += this.speedX;

        let radiusSlider = modal.querySelector('#radiusSlider');
        radiusSlider.value = uiSettings.cardRadius;
        radiusSlider.oninput = () => { 
            uiSettings.cardRadius = parseInt(radiusSlider.value); 
            applyUISettings(); 
            modal.querySelector('#radiusVal').innerText = uiSettings.cardRadius+'px'; 
        };
        let gapSlider = modal.querySelector('#gapSlider');
        gapSlider.value = uiSettings.spacingGap;
        gapSlider.oninput = () => { 
            uiSettings.spacingGap = parseInt(gapSlider.value); 
            applyUISettings(); 
            modal.querySelector('#gapVal').innerText = uiSettings.spacingGap+'px'; 
        };
        let fontSlider = modal.querySelector('#fontSlider');
        fontSlider.value = uiSettings.fontSize;
        fontSlider.oninput = () => { 
            uiSettings.fontSize = parseInt(fontSlider.value); 
            applyUISettings(); 
            modal.querySelector('#fontVal').innerText = uiSettings.fontSize+'px'; 
        };
        
        modal.querySelector('#radiusVal').innerText = uiSettings.cardRadius+'px';
        modal.querySelector('#gapVal').innerText = uiSettings.spacingGap+'px';
        modal.querySelector('#fontVal').innerText = uiSettings.fontSize+'px';
        
        let themeDiv = modal.querySelector('#themeButtons');
        themeDiv.innerHTML = Object.keys(FEM_THEMES).map(name => `<button class="theme-btn" data-theme="${name}">${name}</button>`).join('');
        themeDiv.querySelectorAll('.theme-btn').forEach(btn => {
            btn.onclick = () => {
                let t = FEM_THEMES[btn.dataset.theme];
                uiSettings.expenseColor = t.expense;
                uiSettings.incomeColor = t.income;
                uiSettings.bgColor = t.bg;
                uiSettings.cardBg = t.cardBg;
                applyUISettings();
                preview.style.backgroundColor = uiSettings.expenseColor;
                showToast(`切换至 ${btn.dataset.theme}`);
            };
        });
        
        modal.querySelector('#resetUI').onclick = () => {
            uiSettings = { cardRadius:20, cardPadding:12, fontSize:15, expenseColor:'#e46b5a', incomeColor:'#b5838a', predictColor:'#9b6b9e', spacingGap:8, bgColor:'#fff5f0', cardBg:'#ffffff' };
            applyUISettings();
            modal.remove();
            openSettings();
        };
        
        modal.querySelector('#closeSettings').onclick = () => { 
            saveAll(); 
            modal.remove(); 
            showToast('设置已保存'); 
        };
        modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
    }
    
    function importData() { let input = document.createElement('input'); input.type = 'file'; input.accept = '.json'; input.onchange = (e) => { let file = e.target.files[0]; let reader = new FileReader(); reader.onload = (ev) => { try { let data = JSON.parse(ev.target.result); if(data.menstrualData) menstrualData = data.menstrualData; if(data.symptomsList) symptomsList = data.symptomsList; if(data.uiSettings) uiSettings = {...uiSettings, ...data.uiSettings}; saveAll(); renderCalendar(); showToast('导入成功'); } catch(e) { showToast('文件错误'); } }; reader.readAsText(file); }; input.click(); }
    
   function exportData(filename) {
    let backup = { menstrualData, symptomsList, uiSettings };
    let blob = new Blob([JSON.stringify(backup)], {type:'application/json'});
    
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);

    // ✅ 自动修复后缀
    filename = filename.replace(/\.json$/i, '') + '.json';

    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('导出成功');
} 
    function clearAllData() {
    showConfirm('⚠️ 永久删除所有月经记录和备注，不可恢复！', () => {
        menstrualData = {};
        saveAll();
        renderCalendar();
        showToast('已清空所有数据');
    });
}
    function manageSymptoms() { 
        let modal = document.createElement('div'); 
        modal.className = 'modal-overlay'; 
        modal.innerHTML = `<div class="category-manager"><h3>📝 常用症状标签</h3><div id="symptomList"></div><div class="add-cat-input"><input id="newSym" placeholder="新症状"><button id="addSymBtn">➕ 添加</button></div><button class="close-settings-btn" id="closeSym">关闭</button></div>`; 
        document.body.appendChild(modal); 
        function renderSym() { 
            let div = modal.querySelector('#symptomList'); 
            div.innerHTML = symptomsList.map(s => `<div class="category-list-item"><span>${escapeHtml(s)}</span><button class="delete-cat-btn" data-sym="${escapeHtml(s)}">删除</button></div>`).join(''); 
            div.querySelectorAll('.delete-cat-btn').forEach(btn => { 
                btn.onclick = () => { 
                    let sym = btn.getAttribute('data-sym'); 
                    symptomsList = symptomsList.filter(s => s !== sym); 
                    if(symptomsList.length === 0) symptomsList = ['记录一下']; 
                    saveAll(); 
                    renderSym(); 
                }; 
            }); 
        } 
        renderSym(); 
        modal.querySelector('#addSymBtn').onclick = () => { 
            let newS = modal.querySelector('#newSym').value.trim(); 
            if(newS && !symptomsList.includes(newS)) { symptomsList.push(newS); saveAll(); renderSym(); modal.querySelector('#newSym').value = ''; } 
        }; 
        modal.querySelector('#closeSym').onclick = () => modal.remove(); 
        modal.onclick = (e) => { if(e.target === modal) modal.remove(); }; 
    }
    
    function bindEvents() {
        document.getElementById('prevMonthBtn').onclick = () => changeMonth(-1);
        document.getElementById('nextMonthBtn').onclick = () => changeMonth(1);
        const menuButton = document.getElementById('menuButton');
        const dropdown = document.getElementById('menuDropdown');
        menuButton.onclick = (e) => { 
            e.stopPropagation(); 
            toggleMenuDropdown(menuButton);
        };
        document.addEventListener('click', (e) => {
            if (dropdown.style.display === 'block' && !menuButton.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.style.display = 'none';
            }
        });
document.getElementById('exportMenuItem').onclick = () => {

    let today = new Date();
    let defaultName = `经期记录备份${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

    showInput(
        '导出备份',
        '请输入文件名',
        defaultName,
        (filename) => {
            if (!filename.trim()) {
    showToast('文件名不能为空');
    return;
}
            exportData(filename); // ✅ 调用这里
        }
    );

    dropdown.style.display = 'none';
};
        document.getElementById('knowledgeMenuItem').onclick = () => { openKnowledge(); dropdown.style.display = 'none'; };
        document.getElementById('settingsMenuItem').onclick = () => { openSettings(); dropdown.style.display = 'none'; };
  
        document.getElementById('importMenuItem').onclick = () => { importData(); dropdown.style.display = 'none'; };
        document.getElementById('clearAllDataBtn').onclick = () => { clearAllData(); dropdown.style.display = 'none'; };
        document.getElementById('manageSymptomsBtn').onclick = () => { manageSymptoms(); dropdown.style.display = 'none'; };
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function startSakuraAnimation() { const canvas = document.getElementById('sakuraCanvas'); if (canvas && !sakuraAnimation) { sakuraAnimation = new SakuraAnimation(canvas); } }
    
    loadAll(); bindEvents(); bindGestures(); renderCalendar(); startSakuraAnimation();
</script>
