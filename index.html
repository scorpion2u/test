<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎬 表情包搜索 · 一键分享</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f0c29 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, sans-serif;
            padding: 16px 12px 32px;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .subhead {
            color: #aaa;
            font-size: 0.9rem;
        }

        /* 搜索框 */
        .search-section {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 5px 5px 5px 22px;
            border: 1px solid rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            max-width: 600px;
            margin: 0 auto 16px;
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 1.1rem;
            padding: 14px 6px 14px 0;
            color: white;
            outline: none;
        }

        .search-input::placeholder {
            color: #888;
        }

        .search-btn {
            background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
            border: none;
            color: #1a1a2e;
            font-weight: 700;
            font-size: 1rem;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-btn:hover {
            opacity: 0.9;
        }

        /* 快捷标签 */
        .quick-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .tag {
            background: rgba(247, 151, 30, 0.15);
            padding: 8px 16px;
            border-radius: 30px;
            color: #ffd200;
            cursor: pointer;
            border: 1px solid rgba(247, 151, 30, 0.3);
            transition: 0.15s;
            font-size: 0.9rem;
        }

        .tag:hover {
            background: #f7971e;
            color: #1a1a2e;
        }

        /* 状态区 */
        .status-area {
            text-align: center;
            margin: 15px 0;
            min-height: 32px;
            color: #ccc;
            font-weight: 500;
        }

        .loader {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,210,0,0.2);
            border-top-color: #ffd200;
            border-radius: 50%;
            animation: spin 0.8s infinite linear;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* 提示条 */
        .tip-bar {
            background: rgba(247, 151, 30, 0.1);
            border-radius: 30px;
            padding: 10px 20px;
            margin-bottom: 20px;
            text-align: center;
            color: #ffd200;
            font-size: 0.85rem;
            border: 1px solid rgba(247, 151, 30, 0.2);
        }

        /* GIF 网格 */
        .gif-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
        }

        .gif-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.08);
            transition: 0.2s;
            cursor: pointer;
        }

        .gif-card:hover {
            transform: translateY(-4px);
            border-color: #f7971e;
        }

        .gif-image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #1a1838;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gif-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-footer {
            padding: 8px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .gif-size {
            color: #999;
            font-size: 0.7rem;
        }

        .share-btn {
            background: #25D366;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }

        .share-btn.wechat {
            background: #07C160;
        }

        .share-btn.copy {
            background: #666;
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1e1e2f;
            border-radius: 24px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            border: 1px solid #f7971e;
        }

        .modal-title {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-gif {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-btn {
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .modal-btn.whatsapp {
            background: #25D366;
            color: white;
        }

        .modal-btn.wechat {
            background: #07C160;
            color: white;
        }

        .modal-btn.copy {
            background: #444;
            color: white;
        }

        .modal-btn.download {
            background: #f7971e;
            color: #1a1a2e;
        }

        .modal-close {
            margin-top: 16px;
            background: transparent;
            border: 1px solid #555;
            color: #aaa;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
        }

        /* 微信提示 */
        .wechat-note {
            color: #aaa;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 12px;
        }

        .footer-note {
            margin-top: 32px;
            text-align: center;
            color: #777;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>
            <span>🎬</span> 表情包搜索 <span>✨</span>
        </h1>
        <div class="subhead">Tenor · 华人最爱 · 一键分享</div>
    </div>

    <!-- 搜索框 -->
    <div class="search-section">
        <input type="text" class="search-input" id="searchInput" placeholder="输入关键词（支持中文）..." value="开心" autofocus>
        <button class="search-btn" id="searchBtn">🔍 搜索</button>
    </div>

    <!-- 快捷标签（符合华人习惯）-->
    <div class="quick-tags">
        <span class="tag" data-keyword="谢谢">🙏 谢谢</span>
        <span class="tag" data-keyword="早安">🌅 早安</span>
        <span class="tag" data-keyword="晚安">🌙 晚安</span>
        <span class="tag" data-keyword="加油">💪 加油</span>
        <span class="tag" data-keyword="恭喜发财">🧧 恭喜发财</span>
        <span class="tag" data-keyword="鼓掌">👏 鼓掌</span>
        <span class="tag" data-keyword="爱心">❤️ 爱心</span>
        <span class="tag" data-keyword="ok">👍 OK</span>
    </div>

    <!-- 提示 -->
    <div class="tip-bar" id="tipBar">
        💡 点击 GIF 可选择分享到 WhatsApp / 微信
    </div>

    <div class="status-area" id="statusArea"></div>

    <div class="gif-grid" id="gifGrid"></div>

    <div class="footer-note">
        ⚡ 内容来自 Tenor · 支持中文 · 点击直接分享
    </div>
</div>

<!-- 分享弹窗 -->
<div class="modal" id="shareModal">
    <div class="modal-content">
        <div class="modal-title" id="modalTitle">分享表情包</div>
        <img class="modal-gif" id="modalGif" src="" alt="GIF">
        <div class="modal-actions">
            <button class="modal-btn whatsapp" id="shareWhatsApp">
                <span>💬</span> 分享到 WhatsApp
            </button>
            <button class="modal-btn wechat" id="shareWeChat">
                <span>💬</span> 分享到微信（复制链接）
            </button>
            <button class="modal-btn copy" id="shareCopy">
                <span>📋</span> 复制 GIF 链接
            </button>
            <button class="modal-btn download" id="shareDownload">
                <span>⬇️</span> 保存到相册
            </button>
        </div>
        <div class="wechat-note">
            ※ 微信需手动粘贴链接到聊天框发送
        </div>
        <button class="modal-close" id="modalClose">取消</button>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ========== Tenor API 配置 ==========
        const TENOR_API_KEY = 'LIVDSRZULELA';
        const TENOR_SEARCH_URL = 'https://g.tenor.com/v2/search';
        const LIMIT = 30;

        // 使用 corsproxy.io 代理（相对稳定）
        const PROXY_URL = 'https://corsproxy.io/?';

        let currentAbortController = null;
        let currentGifUrl = '';
        let currentGifTitle = '';

        // DOM 元素
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const statusArea = document.getElementById('statusArea');
        const gifGrid = document.getElementById('gifGrid');
        const tipBar = document.getElementById('tipBar');
        
        // 弹窗元素
        const modal = document.getElementById('shareModal');
        const modalGif = document.getElementById('modalGif');
        const modalTitle = document.getElementById('modalTitle');

        // ========== 辅助函数 ==========
        function setStatus(text, isLoading = false) {
            if (isLoading) {
                statusArea.innerHTML = `<span class="loader"></span> ${text}`;
            } else {
                statusArea.innerHTML = text;
            }
        }

        function clearGrid() {
            gifGrid.innerHTML = '';
        }

        // 格式化文件大小
        function formatSize(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return bytes + 'B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + 'KB';
            return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
        }

        // 获取微信发送建议
        function getWechatTip(size) {
            if (!size) return '';
            if (size < 1024 * 1024) return '✅ 小于1MB，微信可自动播放';
            if (size < 5 * 1024 * 1024) return '⚠️ 1-5MB，微信需点击播放';
            return '❌ 超过5MB，微信无法发送';
        }

        // ========== 渲染 GIF 网格 ==========
        function renderGifs(results, queryTerm = '') {
            clearGrid();
            
            if (!results || results.length === 0) {
                setStatus(`😕 没有找到 "${queryTerm}" 的相关表情包`);
                return;
            }
            
            setStatus(`✅ 找到 ${results.length} 个表情包`);
            
            results.forEach(item => {
                const gifUrl = item.media_formats?.gif?.url || 
                               item.media_formats?.tinygif?.url;
                const previewUrl = item.media_formats?.tinygif?.url || gifUrl;
                const gifSize = item.media_formats?.gif?.size;
                
                if (!gifUrl) return;
                
                const title = item.content_description || item.title || 'GIF';
                const shortTitle = title.length > 12 ? title.slice(0, 10) + '..' : title;
                
                const card = document.createElement('div');
                card.className = 'gif-card';
                
                const imgWrapper = document.createElement('div');
                imgWrapper.className = 'gif-image-wrapper';
                const img = document.createElement('img');
                img.className = 'gif-img';
                img.src = previewUrl;
                img.alt = title;
                img.loading = 'lazy';
                
                imgWrapper.appendChild(img);
                
                const footer = document.createElement('div');
                footer.className = 'card-footer';
                
                const sizeSpan = document.createElement('span');
                sizeSpan.className = 'gif-size';
                sizeSpan.textContent = formatSize(gifSize);
                sizeSpan.title = getWechatTip(gifSize);
                
                const shareBtn = document.createElement('button');
                shareBtn.className = 'share-btn';
                shareBtn.innerHTML = '📤 分享';
                shareBtn.onclick = (e) => {
                    e.stopPropagation();
                    openShareModal(gifUrl, title, gifSize);
                };
                
                footer.appendChild(sizeSpan);
                footer.appendChild(shareBtn);
                
                card.appendChild(imgWrapper);
                card.appendChild(footer);
                
                card.onclick = () => openShareModal(gifUrl, title, gifSize);
                
                gifGrid.appendChild(card);
            });
        }

        // ========== 打开分享弹窗 ==========
        function openShareModal(url, title, size) {
            currentGifUrl = url;
            currentGifTitle = title;
            
            modalGif.src = url;
            modalTitle.textContent = title.length > 30 ? title.slice(0, 28) + '..' : title;
            
            // 添加大小提示
            const sizeText = formatSize(size);
            const wechatTip = getWechatTip(size);
            
            modal.style.display = 'flex';
        }

        // ========== 关闭弹窗 ==========
        function closeModal() {
            modal.style.display = 'none';
        }

        // ========== 分享到 WhatsApp ==========
        function shareToWhatsApp() {
            const text = encodeURIComponent(`${currentGifTitle}\n${currentGifUrl}`);
            window.open(`https://api.whatsapp.com/send?text=${text}`, '_blank');
            tipBar.innerHTML = '✅ 已唤起 WhatsApp，选择联系人即可发送';
        }

        // ========== 分享到微信（复制链接）==========
        function shareToWeChat() {
            navigator.clipboard.writeText(currentGifUrl).then(() => {
                tipBar.innerHTML = '✅ GIF 链接已复制！打开微信粘贴到聊天框即可发送';
                closeModal();
            }).catch(() => {
                prompt('手动复制以下链接，粘贴到微信：', currentGifUrl);
            });
        }

        // ========== 复制链接 ==========
        function copyLink() {
            navigator.clipboard.writeText(currentGifUrl).then(() => {
                tipBar.innerHTML = '✅ 链接已复制到剪贴板';
                closeModal();
            }).catch(() => {
                prompt('手动复制以下链接：', currentGifUrl);
            });
        }

        // ========== 下载到相册 ==========
        async function downloadGif() {
            try {
                setStatus('📥 正在下载...');
                const proxyUrl = PROXY_URL + encodeURIComponent(currentGifUrl);
                const response = await fetch(proxyUrl);
                const blob = await response.blob();
                
                const a = document.createElement('a');
                const blobUrl = URL.createObjectURL(blob);
                a.href = blobUrl;
                const cleanName = currentGifTitle.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_').slice(0, 30);
                a.download = `${cleanName}.gif`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
                
                tipBar.innerHTML = '✅ 已保存到相册，可从相册发送到微信/WhatsApp';
                setStatus('');
                closeModal();
            } catch (err) {
                window.open(currentGifUrl, '_blank');
                tipBar.innerHTML = '💡 请在新页面长按图片保存';
                setStatus('');
            }
        }

        // ========== 搜索 GIF ==========
        async function searchGifs(query) {
            const trimmedQuery = query.trim();
            if (!trimmedQuery) {
                searchInput.value = '开心';
                return searchGifs('开心');
            }
            
            if (currentAbortController) {
                currentAbortController.abort();
            }
            currentAbortController = new AbortController();
            
            clearGrid();
            setStatus(`🔍 搜索 "${trimmedQuery}" ...`, true);
            tipBar.innerHTML = '💡 搜索中，请稍候...';
            
            try {
                const params = new URLSearchParams({
                    key: TENOR_API_KEY,
                    q: trimmedQuery,
                    limit: LIMIT.toString(),
                    media_filter: 'gif',
                    contentfilter: 'medium',
                    locale: 'zh_CN'
                });
                
                const apiUrl = `${TENOR_SEARCH_URL}?${params.toString()}`;
                const proxyUrl = PROXY_URL + encodeURIComponent(apiUrl);
                
                const response = await fetch(proxyUrl, { signal: currentAbortController.signal });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                if (currentAbortController.signal.aborted) return;
                
                renderGifs(data.results, trimmedQuery);
                tipBar.innerHTML = '💡 点击表情包可选择分享到 WhatsApp / 微信';
                
            } catch (error) {
                if (error.name === 'AbortError') return;
                console.error('搜索失败:', error);
                setStatus(`⚠️ 搜索失败，请刷新页面重试`);
                tipBar.innerHTML = '⚠️ 网络问题，请稍后重试';
            } finally {
                currentAbortController = null;
            }
        }

        // ========== 初始化 ==========
        function init() {
            searchBtn.addEventListener('click', () => searchGifs(searchInput.value));
            
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchGifs(searchInput.value);
            });
            
            // 快捷标签
            document.querySelectorAll('.tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    const keyword = tag.dataset.keyword;
                    searchInput.value = keyword;
                    searchGifs(keyword);
                });
            });
            
            // 弹窗按钮
            document.getElementById('shareWhatsApp').addEventListener('click', shareToWhatsApp);
            document.getElementById('shareWeChat').addEventListener('click', shareToWeChat);
            document.getElementById('shareCopy').addEventListener('click', copyLink);
            document.getElementById('shareDownload').addEventListener('click', downloadGif);
            document.getElementById('modalClose').addEventListener('click', closeModal);
            
            // 点击弹窗外部关闭
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });
            
            // 页面加载
            window.addEventListener('load', () => {
                setTimeout(() => searchGifs('开心'), 100);
            });
        }

        init();
    })();
</script>
</body>
</html>
