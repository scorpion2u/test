  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .container {
      max-width: 860px;
      width: 100%;
      background: #ffffff;
      border-radius: 2rem;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.08);
      padding: 2rem 1.8rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      color: #1a2639;
      margin-bottom: 0.3rem;
    }
    .subtitle {
      color: #5b677b;
      margin-bottom: 1.2rem;
      font-size: 0.9rem;
      border-left: 4px solid #3b82f6;
      padding-left: 1rem;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .top-bar .subtitle {
      margin-bottom: 0;
    }
    .menu-container {
      position: relative;
      z-index: 1000;
    }
    .menu-button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.1);
      background: white;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }
    .menu-button:hover {
      background: #f1f5f9;
    }
    .menu-dropdown {
      position: absolute;
      top: 48px;
      right: 0;
      background: white;
      border-radius: 16px;
      width: 220px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.15);
      display: none;
      z-index: 1001;
      padding: 4px 0;
      border: 1px solid rgba(0, 0, 0, 0.1);
    }
    .menu-dropdown.show {
      display: block;
    }
    .menu-item {
      padding: 12px 16px;
      cursor: pointer;
      font-size: 0.85rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      transition: background 0.1s;
      user-select: none;
    }
    .menu-item:last-child {
      border-bottom: none;
    }
    .menu-item:hover {
      background: rgba(0, 0, 0, 0.03);
    }
    .menu-item:active {
      background: rgba(0, 0, 0, 0.06);
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.6rem;
      margin-bottom: 1.8rem;
    }
    .tool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      padding: 0.8rem 0.5rem;
      border-radius: 1.2rem;
      border: 2px solid transparent;
      background: #f8fafc;
      color: #475569;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
      text-align: center;
    }
    .tool-btn .tool-icon {
      font-size: 1.4rem;
      line-height: 1;
    }
    .tool-btn .tool-label {
      font-size: 0.75rem;
      line-height: 1;
    }
    .tool-btn:hover {
      background: #eef2ff;
      border-color: #c7d2fe;
    }
    .tool-btn.active {
      background: #1e293b;
      color: white;
      border-color: #1e293b;
      box-shadow: 0 4px 12px rgba(30, 41, 59, 0.25);
    }
    .tool-btn.active:hover {
      background: #1e293b;
    }
    .card {
      background: #f9fafc;
      border-radius: 1.5rem;
      padding: 1.5rem;
      border: 1px solid #eef2f6;
    }
    .file-area {
      border: 2px dashed #cbd5e1;
      border-radius: 1.2rem;
      padding: 2rem 1rem;
      text-align: center;
      background: #fff;
      transition: 0.2s;
      margin-bottom: 1rem;
      cursor: pointer;
    }
    .file-area:hover {
      border-color: #3b82f6;
      background: #f8faff;
    }
    .file-area.dragover {
      border-color: #2563eb;
      background: #eef4ff;
    }
    .file-input {
      display: none;
    }
    .file-icon {
      font-size: 2rem;
      margin-bottom: 0.3rem;
    }
    .file-label {
      font-weight: 500;
      color: #1e293b;
    }
    .file-hint {
      color: #64748b;
      font-size: 0.75rem;
      margin-top: 0.2rem;
    }
    .file-list-item {
      display: flex;
      align-items: center;
      background: white;
      padding: 0.7rem 1rem;
      border-radius: 1rem;
      margin: 0.4rem 0;
      border: 1px solid #e9eef3;
      font-size: 0.85rem;
      gap: 0.5rem;
      min-width: 0;
    }
    .drag-handle {
      cursor: grab;
      color: #94a3b8;
      font-size: 1.1rem;
      padding: 0 0.2rem;
      user-select: none;
      flex-shrink: 0;
    }
    .file-info {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }
    .file-idx {
      background: #e2e8f0;
      color: #475569;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .file-size {
      font-size: 0.7rem;
      color: #64748b;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      padding: 0.15rem 0.5rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-encrypted {
      background: #fef3c7;
      color: #92400e;
    }
    .badge-ok {
      background: #d1fae5;
      color: #065f46;
    }
    .badge-error {
      background: #fee2e2;
      color: #b91c1c;
    }
    .badge-plain {
      background: #e0e7ff;
      color: #3730a3;
    }
    .file-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
    }
    .pwd-input {
      width: 100px;
      padding: 0.35rem 0.5rem;
      border-radius: 1.5rem;
      border: 1px solid #fbbf24;
      font-size: 0.75rem;
      background: #fffbeb;
      flex-shrink: 0;
    }
    .pwd-input.error {
      border-color: #ef4444 !important;
    }
    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 0.2rem;
      border-radius: 0.5rem;
      flex-shrink: 0;
    }
    .btn-icon:hover {
      background: #fee2e2;
    }
    .btn-retry {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      padding: 0.15rem 0.5rem;
      border-radius: 1rem;
      font-size: 0.65rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn-group {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .btn-primary {
      background: #1e293b;
      border: none;
      color: white;
      padding: 0.6rem 1.5rem;
      border-radius: 2rem;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: 0.2s;
    }
    .btn-primary:hover {
      background: #111827;
    }
    .btn-danger {
      background: #dc2626;
    }
    .btn-danger:hover {
      background: #b91c1c;
    }
    .btn-secondary {
      background: white;
      border: 1px solid #d1d5db;
      color: #1f2937;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .password-section {
      margin-top: 0.8rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      background: #fef3c7;
      padding: 0.7rem 1rem;
      border-radius: 1rem;
      border: 1px solid #fbbf24;
    }
    .password-input {
      padding: 0.5rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid #d1d5db;
      flex: 1;
      min-width: 120px;
    }
    .toggle-pwd {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      color: #3b82f6;
    }
    .info-box {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 1rem;
      padding: 0.7rem 1rem;
      margin-top: 0.8rem;
      font-size: 0.8rem;
      color: #1e40af;
      line-height: 1.5;
    }
    .highlight-box {
      background: #fefce8;
      border: 2px solid #facc15;
      border-radius: 1rem;
      padding: 0.8rem;
      margin-top: 0.8rem;
      font-size: 0.8rem;
      display: flex;
      gap: 0.6rem;
      align-items: flex-start;
    }
    .progress-bar-wrap {
      width: 100%;
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      margin-top: 0.8rem;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 4px;
      transition: width 0.3s;
      width: 0%;
    }
    .status {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      display: inline-block;
    }
    .status-info {
      color: #2563eb;
      background: #eef4ff;
    }
    .status-warn {
      color: #b45309;
      background: #fffbeb;
    }
    .status-success {
      color: #059669;
      background: #ecfdf5;
    }
    .same-pwd-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.6rem;
      font-size: 0.8rem;
    }
    .same-pwd-row input[type="checkbox"] {
      accent-color: #3b82f6;
    }
    .quality-selector {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 0.8rem;
      flex-wrap: wrap;
      background: #f8fafc;
      padding: 0.6rem 1rem;
      border-radius: 1rem;
      font-size: 0.8rem;
    }
    .quality-selector label {
      font-weight: 500;
      white-space: nowrap;
    }
    .quality-selector select {
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid #d1d5db;
      font-size: 0.8rem;
    }
    select {
      padding: 0.5rem;
      border-radius: 2rem;
      border: 1px solid #ccc;
      font-size: 0.85rem;
    }
    .output-format-row {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 0.8rem;
    }
    .output-format-row label {
      font-weight: 500;
      font-size: 0.85rem;
    }
    /* 水印设置样式 */
    .watermark-settings {
      margin-top: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .watermark-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .watermark-row label {
      font-weight: 500;
      font-size: 0.8rem;
      white-space: nowrap;
      min-width: 60px;
    }
    .watermark-row input[type="text"] {
      flex: 1;
      min-width: 150px;
      padding: 0.5rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid #d1d5db;
      font-size: 0.85rem;
    }
    .watermark-row input[type="range"] {
      flex: 1;
      min-width: 80px;
    }
    .watermark-row select {
      flex: 1;
      min-width: 100px;
      padding: 0.5rem;
      border-radius: 2rem;
      border: 1px solid #d1d5db;
      font-size: 0.8rem;
    }
    .watermark-row .range-value {
      font-size: 0.75rem;
      color: #64748b;
      min-width: 30px;
      text-align: center;
    }
    @media (max-width: 600px) {
      .container {
        padding: 1.2rem 0.8rem;
      }
      .tools-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 0.4rem;
      }
      .tool-btn {
        padding: 0.6rem 0.3rem;
      }
      .tool-btn .tool-icon {
        font-size: 1.2rem;
      }
      .tool-btn .tool-label {
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>📄 PDF工具箱</h1>
      <div class="menu-container" id="menuContainer">

    <div class="card" id="toolCard"></div>
    <div id="statusArea" style="text-align: center;"></div>

      function detectBrowserLanguage() {
        const lang = (navigator.language || navigator.userLanguage || 'zh-CN').toLowerCase();
        if (lang.startsWith('zh')) return 'zh-CN';
        return 'en-US';
      }

      let currentLang = detectBrowserLanguage();
      try {
        const saved = localStorage.getItem('pdf-tool-lang');
        if (saved && LANGUAGES[saved]) currentLang = saved;
      } catch (e) {}

      function t(key) {
        return LANGUAGES[currentLang]?.[key] || LANGUAGES['zh-CN'][key] || key;
      }

        document.querySelector('h1').textContent = t('menuTitle');
        document.querySelector('.subtitle').textContent = t('subtitle');

          'imagesToPdf'

        document.querySelectorAll('.tool-btn .tool-label').forEach((el, i) => {
          if (i < labels.length) el.textContent = t(labels[i]);
        });
        updateMenuLanguage();
        renderToolUI();
      }

          'installApp') : t('addToHome'));
        const lb = document.getElementById('languageMenuItem');
        if (lb) lb.textContent = t('language');
      }

      function isRunningAsPWA() {
        return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
      }

      function detectBrowser() {
        const ua = navigator.userAgent;
        if (/Edg/.test(ua)) return 'edge';
        if (/Chrome/.test(ua) && /Google Inc/.test(navigator.vendor)) return 'chrome';
        if (/Safari/.test(ua) && !/Chrome/.test(ua)) return 'safari';
        if (/iPhone|iPad|iPod/.test(ua)) return 'ios';
        return 'other';
      }

      function setStatus(text, type = 'info') {
        const cls = type === 'warn' ? 'status-warn' : type === 'success' ? 'status-success' : 'status-info';
        statusArea.innerHTML = `<div class="status ${cls}">${text}</div>`;

      function getRenderOptions() {
        if (currentTool === 'compress') return {
          scale: parseFloat(document.getElementById('renderScale')?.value || '1.0'),
          quality: parseFloat(document.getElementById('jpegQuality')?.value || '0.6')
        };
        if (currentTool === 'pdfToImages') return {
          scale: parseFloat(document.getElementById('renderScale')?.value || '2.0'),
          quality: parseFloat(document.getElementById('jpegQuality')?.value || '0.92')
        };
        return { scale: 2.0, quality: 0.92 };
      }

      async function renderPdfToImages(file, password = '', options = {}) {
        const { scale = 2.0, quality = 0.92 } = options;
        const arrayBuf = await file.arrayBuffer();
        const loadingTask = pdfjsLib.getDocument({ data: arrayBuf, password: password || undefined });
        return new Promise((resolve, reject) => {
          loadingTask.onPassword = (_, reason) => {
            if (reason === 1) reject(new Error('NEED_PASSWORD'));
            else if (reason === 2) reject(new Error('INCORRECT_PASSWORD'));
          };
          loadingTask.promise.then(async (pdf) => {
            const pages = [];
            for (let i = 1; i <= pdf.numPages; i++) {
              const page = await pdf.getPage(i);
              const vp = page.getViewport({ scale });
              const canvas = document.createElement('canvas');
              canvas.width = vp.width;
              canvas.height = vp.height;
              await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
              const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', quality));
              pages.push({ width: vp.width, height: vp.height, data: await blob.arrayBuffer(), blob });
            }
            resolve(pages);
          }).catch(err => {
            if (err.name === 'PasswordException') reject(new Error('INCORRECT_PASSWORD'));
            else reject(err);
          });
        });
      }

      async function createPdfFromImages(pageImages) {
        const { PDFDocument } = PDFLib;
        const doc = await PDFDocument.create();
        for (const img of pageImages) {
          let jpg;
          if (img.data instanceof ArrayBuffer) jpg = await doc.embedJpg(img.data);
          else if (img.blob) jpg = await doc.embedJpg(await img.blob.arrayBuffer());
          const page = doc.addPage([img.width, img.height]);
          page.drawImage(jpg, { x: 0, y: 0, width: img.width, height: img.height });
        }
        return await doc.save();
      }

      async function checkEncrypted(file) {
        try {
          await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
          return false;
        } catch (e) {
          return !!(e.name === 'PasswordException' || (e.message && e.message.includes('password')));
        }
      }

      async function processPdf(file, password = '') {
        const needsPwd = await checkEncrypted(file);
        if (needsPwd && !password) throw new Error('NEED_PASSWORD');
        return { pageImages: await renderPdfToImages(file, password, getRenderOptions()), isEncrypted: needsPwd };
      }

      function handleError(err, idx) {
        const entry = fileEntries[idx];
        if (!entry) return;
        if (err.message === 'NEED_PASSWORD') {
          entry.status = 'error';
          setStatus(`⚠️ ${t('needPassword')}`, 'warn');
        } else if (err.message === 'INCORRECT_PASSWORD') {
          entry.status = 'error';
          setStatus(`❌ ${t('wrongPassword')}`, 'warn');
        } else {
          setStatus(`❌ ${err.message}`, 'warn');
        }
        renderFileList();
      }

        return `${fileDropArea(true, t('selectImagesToPdf'), '.jpg,.jpeg,.png,.webp,.bmp')}<div style="margin-top:0.8rem;display:flex;gap:0.8rem;align-items:center;flex-wrap:wrap;"><label>${t('pageSize')}</label><select id="pageSize"><option value="auto" selected>${t('auto')}</option><option value="a4">A4</option><option value="letter">Letter</option></select><label>${t('fitMode')}</label><select id="fitMode"><option value="fit" selected>${t('fit')}</option><option value="fill">${t('fill')}</option><option value="original">${t('original')}</option></select></div><div class="info-box">💡 ${t('imgInfo')}</div><div class="btn-group"><button class="btn-primary" id="actionBtn">${t('startCompose')}</button><button class="btn-secondary" id="clearBtn">${t('clearList')}</button></div>`;
      }

      async function renderFileList() {
        const listDiv = document.getElementById('fileAreaList');
        if (!listDiv) return;
        if (!fileEntries.length) {
          listDiv.innerHTML = '';
          updatePasswordUI();
          return;
        }
        if (currentTool !== 'imagesToPdf') {
          for (const e of fileEntries) {
            if (e.encrypted === undefined) e.encrypted = await checkEncrypted(e.file);
          }
        }
        updatePasswordUI();
        const useSame = isSamePasswordMode();
        listDiv.innerHTML = fileEntries.map((entry, idx) => {
          const isImg = currentTool === 'imagesToPdf';
          const sBadge = entry.status === 'ok' ? '<span class="badge badge-ok">✅</span>' : entry.status ===
            'error' ? '<span class="badge badge-error">❌</span>' : '';
          const eBadge = !isImg ? (entry.encrypted ? '<span class="badge badge-encrypted">🔒</span>' :
            '<span class="badge badge-plain">📄</span>') : '';
          let pwdHtml = '';
          if (!isImg && entry.encrypted && !useSame) {
            pwdHtml =
              `<input type="password" class="pwd-input ${entry.status==='error'?'error':''}" value="${escapeHtml(entry.password||'')}" data-idx="${idx}" placeholder="${t('passwordPlaceholder')}">`;
            if (entry.status === 'error') pwdHtml += `<button class="btn-retry" data-idx="${idx}">🔄</button>`;
          } else if (!isImg && entry.encrypted && entry.status === 'error' && useSame) {
            pwdHtml = `<button class="btn-retry" data-idx="${idx}">🔄</button>`;
          }
          return `<div class="file-list-item" draggable="true" data-idx="${idx}"><span class="drag-handle">⠿</span><div class="file-info"><span class="file-idx">${idx+1}</span><span class="file-name">${isImg ? '🖼️' : '📄'} ${escapeHtml(entry.file.name)}</span><span class="file-size">(${(entry.file.size/1024).toFixed(0)}KB)</span>${eBadge}${sBadge}</div><div class="file-actions">${pwdHtml}<button class="btn-icon remove-btn" data-idx="${idx}">✕</button></div></div>`;
        }).join('');
        bindListEvents();
      }

      function bindListEvents() {
        const list = document.getElementById('fileAreaList');
        if (!list) return;
        list.querySelectorAll('.remove-btn').forEach(b => b.onclick = (e) => {
          e.stopPropagation();
          fileEntries.splice(parseInt(b.dataset.idx), 1);
          renderFileList();
        });
        list.querySelectorAll('.pwd-input').forEach(i => i.oninput = function() {
          const idx = parseInt(this.dataset.idx);
          fileEntries[idx].password = this.value;
          if (fileEntries[idx].status === 'error') {
            fileEntries[idx].status = undefined;
            renderFileList();
          }
        });
        list.querySelectorAll('.btn-retry').forEach(b => b.onclick = () => {
          const idx = parseInt(b.dataset.idx);
          fileEntries[idx].status = undefined;
          renderFileList();
          executeAction(idx);
        });
        setupDragSort(list);
      }

      function setupDragSort(list) {
        let dragIdx = null;
        list.querySelectorAll('.file-list-item').forEach(item => {
          item.addEventListener('dragstart', () => {
            dragIdx = parseInt(item.dataset.idx);
            item.style.opacity = '0.5';
          });
          item.addEventListener('dragend', () => {
            item.style.opacity = '1';
            list.querySelectorAll('.file-list-item').forEach(el => el.classList.remove('drag-over'));
          });
          item.addEventListener('dragover', (e) => {
            e.preventDefault();
            item.classList.add('drag-over');
          });
          item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
          item.addEventListener('drop', (e) => {
            e.preventDefault();
            item.classList.remove('drag-over');
            const dropIdx = parseInt(item.dataset.idx);
            if (dragIdx !== null && dragIdx !== dropIdx) {
              const [m] = fileEntries.splice(dragIdx, 1);
              fileEntries.splice(dropIdx, 0, m);
              renderFileList();
            }
          });
        });
      }

      function updatePasswordUI() {
        const hasEnc = fileEntries.some(e => e.encrypted);
        const useSame = isSamePasswordMode();
        const gs = document.getElementById('globalPwdSection');
        const sr = document.getElementById('samePwdRow');
        if (gs) gs.style.display = (hasEnc && useSame && currentTool !== 'imagesToPdf') ? 'flex' : 'none';
        if (sr) sr.style.display = (hasEnc && fileEntries.length > 1 && multiFileTools.includes(currentTool)) ? 'flex' :
          'none';
      }

      function isSamePasswordMode() {
        const c = document.getElementById('samePwdCheck');
        return c ? c.checked : true;
      }

      function getPasswordForFile(idx) {
        return isSamePasswordMode() ? (document.getElementById('globalPassword')?.value || '') : (fileEntries[idx]
          ?.password || '');
      }

      function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function download(blob, name) {
        const reader = new FileReader();
        reader.onload = function() {
          const a = document.createElement('a');
          a.href = reader.result;
          a.download = name;
          a.style.display = 'none';
          document.body.appendChild(a);
          a.click();
          setTimeout(() => {
            document.body.removeChild(a);
          }, 200);
        };
        reader.onerror = function() {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = name;
          a.style.display = 'none';
          document.body.appendChild(a);
          a.click();
          setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          }, 200);
        };
        reader.readAsDataURL(blob);
      }

      function parseRange(s, total) {
        const set = new Set();
        if (!s.trim()) return [...Array(total).keys()];
        s.split(',').forEach(p => {
          p = p.trim();
          if (p.includes('-')) {
            const [a, b] = p.split('-').map(Number);
            for (let i = a; i <= b; i++)
              if (i >= 1 && i <= total) set.add(i - 1);
          } else {
            const n = Number(p);
            if (n >= 1 && n <= total) set.add(n - 1);
          }
        });
        return [...set].sort((a, b) => a - b);
      }

      function attachEvents() {
        const area = document.getElementById('fileArea');
        const input = document.getElementById('fileAreaInput');
        if (area && input) {
          area.onclick = () => input.click();
          area.ondragover = (e) => {
            e.preventDefault();
            area.classList.add('dragover');
          };
          area.ondragleave = () => area.classList.remove('dragover');
          area.ondrop = (e) => {
            e.preventDefault();
            area.classList.remove('dragover');
            const fs = Array.from(e.dataTransfer.files).filter(f => {
              if (currentTool === 'imagesToPdf') return f.type.startsWith('image/');
              return f.type === 'application/pdf' || f.name.endsWith('.pdf');
            });
            if (fs.length) {
              if (!multiFileTools.includes(currentTool)) fileEntries = [];
              fileEntries.push(...fs.map(f => ({ file: f, password: '', status: undefined, encrypted: undefined })));
              renderFileList();
            }
          };
          input.onchange = () => {
            const fs = Array.from(input.files);
            if (!multiFileTools.includes(currentTool)) fileEntries = [];
            fileEntries.push(...fs.map(f => ({ file: f, password: '', status: undefined, encrypted: undefined })));
            input.value = '';
            renderFileList();
          };
        }
        document.getElementById('clearBtn')?.addEventListener('click', () => {
          fileEntries = [];
          renderFileList();
        });
        document.getElementById('samePwdCheck')?.addEventListener('change', renderFileList);
        document.querySelectorAll('.toggle-pwd').forEach(b => b.onclick = () => {
          const tg = document.getElementById(b.dataset.target);
          if (tg) {
            tg.type = tg.type === 'password' ? 'text' : 'password';
            b.textContent = tg.type === 'password' ? t('show') : t('hide');
          }
        });
        document.getElementById('splitMode')?.addEventListener('change', (e) => {
          const w = document.getElementById('rangeInputWrap');
          if (w) w.style.display = e.target.value === 'range' ? 'block' : 'none';
        });
        // 水印滑块事件
        const angleEl = document.getElementById('watermarkAngle');
        const opacityEl = document.getElementById('watermarkOpacity');
        const sizeEl = document.getElementById('watermarkSize');
        if (angleEl) angleEl.oninput = () => {
          const v = document.getElementById('angleVal');
          if (v) v.textContent = angleEl.value + '°';
        };
        if (opacityEl) opacityEl.oninput = () => {
          const v = document.getElementById('opacityVal');
          if (v) v.textContent = opacityEl.value;
        };
        if (sizeEl) sizeEl.oninput = () => {
          const v = document.getElementById('sizeVal');
          if (v) v.textContent = sizeEl.value;
        };
        document.getElementById('actionBtn')?.addEventListener('click', () => executeAction(0));
      }

      async function executeAction(startIdx = 0) {
        if (!fileEntries.length) {
          setStatus(t('noFile'), 'warn');
          return;
        }
        try {
          const actions = {
            merge: () => doMerge(startIdx),
            split: doSplit,
            removePassword: () => doRemovePassword(startIdx),
            compress: doCompress,
            watermark: doWatermark,
            extractPages: doExtractPages,
            pdfToImages: doPdfToImages,
            imagesToPdf: doImagesToPdf
          };
          await (actions[currentTool] || (() => {}))();
        } catch (err) {
          setStatus(`❌ ${err.message}`, 'warn');
        }
      }

      async function doMerge(startIdx) {
        if (fileEntries.length < 2) {
          setStatus(t('atLeast2'), 'warn');
          return;
        }
        const allImages = [];
        for (let i = startIdx; i < fileEntries.length; i++) {
          setProgress((i / fileEntries.length) * 100, `${t('processing')} ${fileEntries[i].file.name}`);
          try {
            const { pageImages } = await processPdf(fileEntries[i].file, getPasswordForFile(i));
            allImages.push(...pageImages);
            fileEntries[i].status = 'ok';
          } catch (err) {
            handleError(err, i);
            return;
          }
        }
        setProgress(100, t('generating'));
        download(new Blob([await createPdfFromImages(allImages)], { type: 'application/pdf' }), 'merged.pdf');
        fileEntries.forEach(e => e.status = undefined);
        setStatus(`✅ ${t('mergeSuccess')} (${allImages.length}${t('pages')})`, 'success');
        renderFileList();
      }

      async function doSplit() {
        const { pageImages } = await processPdf(fileEntries[0].file, getPasswordForFile(0));
        const mode = document.getElementById('splitMode')?.value || 'pages';
        if (mode === 'pages') {
          for (let i = 0; i < pageImages.length; i++) {
            setProgress((i / pageImages.length) * 100);
            download(new Blob([await createPdfFromImages([pageImages[i]])], { type: 'application/pdf' }),
              `page_${i+1}.pdf`);
          }
        } else {
          const indices = parseRange(document.getElementById('rangeInput')?.value || '', pageImages.length);
          if (!indices.length) {
            setStatus(t('invalidRange'), 'warn');
            return;
          }
          download(new Blob([await createPdfFromImages(indices.map(i => pageImages[i]))], { type: 'application/pdf' }),
            'split.pdf');
        }
        setStatus(`✅ ${t('splitSuccess')}`, 'success');
      }

      async function doRemovePassword(startIdx) {
        for (let i = startIdx; i < fileEntries.length; i++) {
          setProgress((i / fileEntries.length) * 100, `${t('processing')} ${fileEntries[i].file.name}`);
          try {
            const { pageImages } = await processPdf(fileEntries[i].file, getPasswordForFile(i));
            download(new Blob([await createPdfFromImages(pageImages)], { type: 'application/pdf' }), fileEntries[i].file
              .name.replace(/\.pdf$/i, '') + '_no_password.pdf');
            fileEntries[i].status = 'ok';
          } catch (err) {
            handleError(err, i);
            return;
          }
        }
        fileEntries.forEach(e => e.status = undefined);
        setStatus(`✅ ${t('extractSuccess')}`, 'success');
        renderFileList();
      }

      async function doCompress() {
        setProgress(0, t('processing'));
        const { pageImages } = await processPdf(fileEntries[0].file, getPasswordForFile(0));
        const bytes = await createPdfFromImages(pageImages);
        download(new Blob([bytes], { type: 'application/pdf' }), 'compressed.pdf');
        setStatus(`✅ ${t('compressSuccess')}`, 'success');
      }

      // 修改 doWatermark 函数中的字体加载部分

async function doWatermark() {
  setProgress(0, t('processing'));
  const { PDFDocument, degrees } = PDFLib;
  
  // 获取水印参数
  const text = document.getElementById('watermarkText')?.value || 'WATERMARK';
  const position = document.getElementById('watermarkPosition')?.value || 'full';
  const angleVal = parseFloat(document.getElementById('watermarkAngle')?.value || '45');
  const opacityVal = parseFloat(document.getElementById('watermarkOpacity')?.value || '0.1');
  const fontSize = parseInt(document.getElementById('watermarkSize')?.value || '40');

  // 加载PDF
  const arrayBuf = await fileEntries[0].file.arrayBuffer();
  
  // 处理加密PDF
  const needsPwd = await checkEncrypted(fileEntries[0].file);
  let pdfDoc;
  
  if (needsPwd) {
    const password = getPasswordForFile(0);
    if (!password) {
      setStatus(t('needPassword'), 'warn');
      return;
    }
    pdfDoc = await PDFDocument.load(arrayBuf, { password });
  } else {
    pdfDoc = await PDFDocument.load(arrayBuf);
  }

  // 检测是否包含中文字符
  const hasChinese = /[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/.test(text);
  
  let font;
  if (hasChinese) {
    // 加载支持中文的字体（使用思源黑体）
    setProgress(10, '加载中文字体...');
    try {
      const fontBytes = await fetch('https://cdn.jsdelivr.net/npm/@canvas-fonts/notosanssc@1.0.0/NotoSansSC-Regular.ttf').then(r => r.arrayBuffer());
      font = await pdfDoc.embedFont(fontBytes);
    } catch (e) {
      // 如果在线字体加载失败，使用备用方案
      setStatus('❌ 中文字体加载失败，请检查网络连接', 'warn');
      return;
    }
  } else {
    // 对于非中文文本，使用标准字体
    const { StandardFonts } = PDFLib;
    font = await pdfDoc.embedFont(StandardFonts.Helvetica);
  }

  setProgress(30, '添加水印...');
  const pages = pdfDoc.getPages();
  const totalPages = pages.length;
  
  for (let i = 0; i < totalPages; i++) {
    const page = pages[i];
    const progress = 30 + (i / totalPages) * 50;
    setProgress(progress);
    
    const { width, height } = page.getSize();
    const textWidth = font.widthOfTextAtSize(text, fontSize);
    const textHeight = font.heightAtSize(fontSize);

    function draw(x, y) {
      page.drawText(text, {
        x,
        y,
        size: fontSize,
        font: font,
        opacity: opacityVal,
        rotate: degrees(angleVal)
      });
    }

    if (position === 'center') {
      draw(
        (width - textWidth) / 2,
        height / 2 - textHeight / 2
      );
    } else if (position === 'top') {
      draw(
        (width - textWidth) / 2,
        height - textHeight * 1.5
      );
    } else if (position === 'bottom') {
      draw(
        (width - textWidth) / 2,
        textHeight * 0.5
      );
    } else if (position === 'full') {
      // 全屏铺满的水印间距
      const xSpacing = Math.max(textWidth * 1.5, fontSize * 4);
      const ySpacing = Math.max(textHeight * 3, fontSize * 4);
      
      for (let x = 0; x < width + textWidth; x += xSpacing) {
        for (let y = 0; y < height + textHeight; y += ySpacing) {
          draw(x, y);
        }
      }
    }
  }

  setProgress(85, t('generating'));
  const pdfBytes = await pdfDoc.save();
  setProgress(100);
  download(new Blob([pdfBytes], { type: 'application/pdf' }), 'watermarked.pdf');
  setStatus(`✅ ${t('watermarkSuccess')}`, 'success');
}

      async function doExtractPages() {
        setProgress(0, t('processing'));
        const { pageImages } = await processPdf(fileEntries[0].file, getPasswordForFile(0));
        const rangeStr = document.getElementById('extractRange')?.value || '';
        const indices = parseRange(rangeStr, pageImages.length);
        if (!indices.length) {
          setStatus(t('pleaseEnterRange'), 'warn');
          return;
        }
        const bytes = await createPdfFromImages(indices.map(i => pageImages[i]));
        download(new Blob([bytes], { type: 'application/pdf' }), `extracted_pages.pdf`);
        setStatus(`✅ ${t('extractSuccess')} (${indices.length}${t('pages')})`, 'success');
      }

      async function doPdfToImages() {
        setProgress(0, t('processing'));
        const { pageImages } = await processPdf(fileEntries[0].file, getPasswordForFile(0));
        const format = document.getElementById('outputFormat')?.value || 'jpeg';
        const useZip = document.getElementById('zipDownload')?.checked ?? false;
        if (pageImages.length === 1 && !useZip) {
          const blob = format === 'png' ? await jpegToPng(pageImages[0].blob) : pageImages[0].blob;
          download(blob, `page_1.${format}`);
        } else if (useZip && typeof JSZip !== 'undefined') {
          const zip = new JSZip();
          for (let i = 0; i < pageImages.length; i++) {
            setProgress((i / pageImages.length) * 100);
            const blob = format === 'png' ? await jpegToPng(pageImages[i].blob) : pageImages[i].blob;
            zip.file(`page_${i+1}.${format}`, blob);
          }
          download(await zip.generateAsync({ type: 'blob' }), 'pdf_images.zip');
        } else {
          for (let i = 0; i < pageImages.length; i++) {
            setProgress((i / pageImages.length) * 100);
            const blob = format === 'png' ? await jpegToPng(pageImages[i].blob) : pageImages[i].blob;
            download(blob, `page_${i+1}.${format}`);
          }
        }
        setStatus(`✅ ${t('convertSuccess')} (${pageImages.length})`, 'success');
      }

      async function jpegToPng(jpegBlob) {
        return new Promise(resolve => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            canvas.getContext('2d').drawImage(img, 0, 0);
            canvas.toBlob(resolve, 'image/png');
          };
          img.src = URL.createObjectURL(jpegBlob);
        });
      }

      async function doImagesToPdf() {
        if (fileEntries.length === 0) {
          setStatus(t('noFile'), 'warn');
          return;
        }
        setProgress(0, t('processing'));
        const pageSize = document.getElementById('pageSize')?.value || 'auto';
        const fitMode = document.getElementById('fitMode')?.value || 'fit';
        const pageDims = { a4: [595, 842], letter: [612, 792] };
        const { PDFDocument } = PDFLib;
        const doc = await PDFDocument.create();
        for (let i = 0; i < fileEntries.length; i++) {
          setProgress((i / fileEntries.length) * 100, `${t('processing')} ${fileEntries[i].file.name}`);
          const buf = await fileEntries[i].file.arrayBuffer();
          const ext = fileEntries[i].file.name.split('.').pop().toLowerCase();
          let img;
          if (ext === 'png') img = await doc.embedPng(buf);
          else if (ext === 'jpg' || ext === 'jpeg') img = await doc.embedJpg(buf);
          else {
            try { img = await doc.embedPng(buf); } catch (e) { img = await doc.embedJpg(buf); }
          }
          let pw, ph;
          if (pageSize === 'auto') { pw = img.width;
            ph = img.height; } else { [pw, ph] = pageDims[pageSize]; }
          const page = doc.addPage([pw, ph]);
          let dw = img.width,
            dh = img.height;
          if (fitMode === 'fit') {
            const s = Math.min(pw / img.width, ph / img.height);
            dw = img.width * s;
            dh = img.height * s;
          } else if (fitMode === 'fill') {
            const s = Math.max(pw / img.width, ph / img.height);
            dw = img.width * s;
            dh = img.height * s;
          }
          page.drawImage(img, { x: (pw - dw) / 2, y: (ph - dh) / 2, width: dw, height: dh });
          fileEntries[i].status = 'ok';
        }
        const bytes = await doc.save();
        download(new Blob([bytes], { type: 'application/pdf' }), 'images_to_pdf.pdf');
        fileEntries.forEach(e => e.status = undefined);
        setStatus(`✅ ${t('composeSuccess')} (${fileEntries.length})`, 'success');
        renderFileList();
      }

      // ==================== 菜单事件 ====================
      document.getElementById('menuButton').addEventListener('click', function(e) {
        e.stopPropagation();
        var dd = document.getElementById('menuDropdown');
        if (dd.classList.contains('show')) {
          dd.classList.remove('show');
        } else {
          dd.classList.add('show');
        }
      });

      document.addEventListener('click', function(e) {
        if (!e.target.closest('#menuContainer')) {
          var dd = document.getElementById('menuDropdown');
          if (dd) dd.classList.remove('show');
        }
      });

      document.getElementById('installAppBtn').addEventListener('click', function() {
        document.getElementById('menuDropdown').classList.remove('show');
        installPWA();
      });

      document.getElementById('languageMenuItem').addEventListener('click', function() {
        document.getElementById('menuDropdown').classList.remove('show');
        showLanguageSelector();
      });

      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window._deferredPrompt = e;
        updateMenuLanguage();
      });

      // 初始化
      updateAllTexts();
    })();
  </script>
