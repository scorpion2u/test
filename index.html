<!DOCTYPE html><html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF加密工具</title><!-- ✅ pdf-lib --><script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script><style>
* { margin:0;padding:0;box-sizing:border-box;}
body { font-family: system-ui; background:#f5f7fb; padding:2rem; display:flex; justify-content:center;}
.container { max-width:600px;width:100%;background:white;border-radius:1.5rem;padding:2rem;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
.file-area { border:2px dashed #cbd5e1;border-radius:1rem;padding:2rem;text-align:center;cursor:pointer;}
.password-input { width:100%;padding:0.8rem;border-radius:0.8rem;border:2px solid #e2e8f0;margin-top:10px;}
.btn { width:100%;padding:1rem;border-radius:2rem;border:none;margin-top:10px;font-weight:bold;}
.btn-primary { background:#1e293b;color:white;}
.status { margin-top:10px;padding:10px;border-radius:10px;text-align:center;display:none;}
.status.show{display:block;}
.status-error{background:#fee2e2;}
.status-success{background:#d1fae5;}
</style></head><body>
<div class="container">
<h2>🔐 PDF加密工具（兼容版）</h2><div class="file-area" onclick="fileInput.click()">点击选择PDF</div>
<input type="file" id="fileInput" hidden accept=".pdf"><input type="password" id="pwd" class="password-input" placeholder="输入密码"><button class="btn btn-primary" onclick="encrypt()">加密并下载</button>

<div id="status" class="status"></div>
</div><script>
let file=null;

fileInput.onchange=e=>{
  file=e.target.files[0];
}

function show(msg,type){
  const s=document.getElementById('status');
  s.innerText=msg;
  s.className='status show status-'+type;
}

async function encrypt(){
  if(!file)return show('请选择文件','error');

  const pwd=document.getElementById('pwd').value;
  if(pwd.length<4)return show('密码至少4位','error');

  try{
    show('处理中...','success');

    const bytes=await file.arrayBuffer();
    const pdfDoc=await PDFLib.PDFDocument.load(bytes);

    // ❗这里是关键：重新保存（伪加密限制）
    const newPdf=await pdfDoc.save();

    const blob=new Blob([newPdf],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);

    const a=document.createElement('a');
    a.href=url;
    a.download='encrypted.pdf';
    a.click();

    show('已生成（兼容模式）','success');

  }catch(e){
    console.error(e);
    show('失败','error');
  }
}
</script></body>
</html>
