<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>表情包搜索 · 稳定版</title>

<style>
body {
    background:#0f0c29;
    color:white;
    font-family:sans-serif;
    padding:20px;
}

.search-box {
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

input {
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
}

button {
    padding:12px;
    border:none;
    border-radius:10px;
    background:orange;
    cursor:pointer;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:10px;
}

img {
    width:100%;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>🔥 表情包搜索（稳定版）</h2>

<div class="search-box">
    <input id="q" placeholder="输入关键词..." value="开心">
    <button onclick="search()">搜索</button>
</div>

<div id="status"></div>
<div class="grid" id="grid"></div>

<script>
const TENOR_KEY = "LIVDSRZULELA";
const GIPHY_KEY = "0L3xTl0lJ9lZ4kQqQZ9Q8X5nO3wW2oKk";

const PROXY = "https://api.allorigins.win/raw?url=";

// ========= 主搜索 =========
async function search(){
    let q = document.getElementById("q").value.trim();
    if(!q) return;

    setStatus("🔍 搜索中...");

    // 尝试顺序：Tenor → Giphy → Proxy
    try {
        let data = await fetchTenor(q);
        if(data?.length) return render(data, "tenor");
    } catch(e){ console.warn("Tenor失败"); }

    try {
        let data = await fetchGiphy(q);
        if(data?.length) return render(data, "giphy");
    } catch(e){ console.warn("Giphy失败"); }

    try {
        let data = await fetchProxy(q);
        if(data?.length) return render(data, "giphy");
    } catch(e){ console.warn("代理失败"); }

    setStatus("❌ 全部源都失败了（换关键词试试）");
}

// ========= Tenor =========
async function fetchTenor(q){
    let url = `https://tenor.googleapis.com/v2/search?q=${q}&key=${TENOR_KEY}&limit=30`;
    let res = await fetch(url);
    let json = await res.json();
    return json.results;
}

// ========= Giphy =========
async function fetchGiphy(q){
    let url = `https://api.giphy.com/v1/gifs/search?q=${q}&api_key=${GIPHY_KEY}&limit=30`;
    let res = await fetch(url);
    let json = await res.json();
    return json.data;
}

// ========= Proxy fallback =========
async function fetchProxy(q){
    let url = `${PROXY}https://api.giphy.com/v1/gifs/search?q=${q}&api_key=${GIPHY_KEY}&limit=20`;
    let res = await fetch(url);
    let json = await res.json();
    return json.data;
}

// ========= 渲染 =========
function render(list, type){
    let grid = document.getElementById("grid");
    grid.innerHTML="";

    list.forEach(item=>{
        let url;

        if(type==="tenor"){
            url = item.media_formats?.gif?.url || item.media_formats?.tinygif?.url;
        }else{
            url = item.images?.fixed_width?.url;
        }

        if(!url) return;

        let img = document.createElement("img");
        img.src = url;
        img.loading="lazy";

        img.onclick = ()=>share(url);

        grid.appendChild(img);
    });

    setStatus(`✅ 加载 ${list.length} 个表情`);
}

// ========= 分享 =========
function share(url){
    if(navigator.share){
        navigator.share({url});
    }else{
        navigator.clipboard.writeText(url);
        alert("已复制链接");
    }
}

// ========= 状态 =========
function setStatus(text){
    document.getElementById("status").innerText=text;
}

// ========= 自动首次搜索 =========
window.onload = ()=>{
    search();
};
</script>

</body>
</html>
