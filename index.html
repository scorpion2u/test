<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>表情包搜索 · 永不失败版</title>

<style>
body {
    background:#0f0c29;
    color:white;
    font-family:sans-serif;
    padding:20px;
}

.search {
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

input {
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
}

button {
    padding:12px;
    border:none;
    border-radius:10px;
    background:orange;
    cursor:pointer;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:10px;
}

img {
    width:100%;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>🔥 表情包搜索（永不失败）</h2>

<div class="search">
    <input id="q" placeholder="输入关键词..." value="开心">
    <button onclick="search()">搜索</button>
</div>

<div id="status"></div>
<div class="grid" id="grid"></div>

<script>

// ✅ 内置表情库（核心）
const GIF_DB = {
    开心: [
        "https://media.tenor.com/2roX3uxz_68AAAAM/happy.gif",
        "https://media.tenor.com/WsQhZzJQ8pQAAAAM/laugh.gif",
        "https://media.tenor.com/tJv4l1dzB9cAAAAM/smile.gif"
    ],
    谢谢: [
        "https://media.tenor.com/4T7QJZk4jSMAAAAM/thank-you.gif",
        "https://media.tenor.com/oR8V2G2jX8kAAAAM/thanks.gif"
    ],
    加油: [
        "https://media.tenor.com/jqfTdAJg9jQAAAAM/lets-go.gif",
        "https://media.tenor.com/XsL7C9N1kQkAAAAM/fighting.gif"
    ],
    生气: [
        "https://media.tenor.com/3bTxZ8z8G4sAAAAM/angry.gif",
        "https://media.tenor.com/hZt7rYQ2rZQAAAAM/mad.gif"
    ],
    爱心: [
        "https://media.tenor.com/WkZ9Jr6s6p4AAAAM/love.gif",
        "https://media.tenor.com/Vs4y1x6YpX8AAAAM/heart.gif"
    ],
    默认: [
        "https://media.tenor.com/2roX3uxz_68AAAAM/happy.gif",
        "https://media.tenor.com/3bTxZ8z8G4sAAAAM/angry.gif",
        "https://media.tenor.com/WkZ9Jr6s6p4AAAAM/love.gif"
    ]
};

// 搜索
function search(){
    let q = document.getElementById("q").value.trim();
    if(!q) q = "默认";

    let result = GIF_DB[q] || GIF_DB["默认"];

    render(result);
}

// 渲染
function render(list){
    let grid = document.getElementById("grid");
    grid.innerHTML="";

    list.forEach(url=>{
        let img = document.createElement("img");
        img.src = url;

        img.onclick = ()=>share(url);

        grid.appendChild(img);
    });

    setStatus(`✅ 已加载 ${list.length} 个表情`);
}

// 分享
function share(url){
    if(navigator.share){
        navigator.share({url});
    }else{
        navigator.clipboard.writeText(url);
        alert("已复制链接");
    }
}

// 状态
function setStatus(t){
    document.getElementById("status").innerText = t;
}

// 默认加载
window.onload = ()=>search();

</script>

</body>
</html>
