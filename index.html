                const icon = type === '现金' ? '💵' : type === 'TNG' ? '🪙' : type === '银行转账' ? '🏦' : type === '其他' ? '📌' : '💰';
                const displayPayStat = convertToDisplayAmount(incomePayStats[type] || 0).toFixed(decimals);
                return `<div style="display:grid;grid-template-columns:120px 1fr;align-items:center;margin-bottom:6px;"><div style="display:flex;align-items:center;gap:6px;"><span style="width:20px;text-align:center;">${icon}</span><span>${escapeHtml(displayType)}</span></div><div style="text-align:right;font-variant-numeric:tabular-nums;">${symbol}${displayPayStat}</div></div>`;
            }).join('')}
        </div>
    `;
    const modal = modalManager.create(statsTitle, html, `<button id="closeStatsBtn" class="close-btn">${t('close')}</button>`);
    if (modal) modal.querySelector('#closeStatsBtn').onclick = () => modalManager.close(modal);
}

            // ==================== 搜索 ====================
            function showSearch(preset = null) {
                const today = new Date();
                const oneYearAgo = new Date();
                oneYearAgo.setFullYear(today.getFullYear() - 1);
                const startDateVal = preset?.startDate || formatDateLocal(oneYearAgo);
                const endDateVal = preset?.endDate || formatDateLocal(today);
                const typeVal = preset?.type || 'all';
                const symbol = getCurrencySymbol();
                const html = `
                    <div style="margin-bottom:12px;"><label style="font-size:0.8rem;color:#64748b;display:block;margin-bottom:4px;">${t('keyword')}</label><input type="text" id="searchKeyword" placeholder="${t('enterKeyword')}" style="width:100%;padding:10px;border-radius:28px;border:1px solid #e2e8f0;outline:none;"></div>
                    <div style="display:flex;gap:10px;margin-bottom:12px;"><div style="flex:1;"><label style="font-size:0.8rem;color:#64748b;display:block;margin-bottom:4px;">${t('startDate')}</label><input type="date" id="searchStartDate" value="${startDateVal}" style="width:100%;padding:8px;border-radius:28px;border:1px solid #e2e8f0;outline:none;"></div><div style="flex:1;"><label style="font-size:0.8rem;color:#64748b;display:block;margin-bottom:4px;">${t('endDate')}</label><input type="date" id="searchEndDate" value="${endDateVal}" style="width:100%;padding:8px;border-radius:28px;border:1px solid #e2e8f0;outline:none;"></div></div>
                    <div style="display:flex;gap:10px;margin-bottom:12px;"><div style="flex:1;"><label style="font-size:0.8rem;color:#64748b;display:block;margin-bottom:4px;">${t('minAmount')} (${symbol})</label><input type="number" id="searchMinAmount" placeholder="0" step="0.01" style="width:100%;padding:8px;border-radius:28px;border:1px solid #e2e8f0;outline:none;"></div><div style="flex:1;"><label style="font-size:0.8rem;color:#64748b;display:block;margin-bottom:4px;">${t('maxAmount')} (${symbol})</label><input type="number" id="searchMaxAmount" placeholder="${t('unlimited')}" step="0.01" style="width:100%;padding:8px;border-radius:28px;border:1px solid #e2e8f0;outline:none;"></div></div>
                    <div style="margin-bottom:16px;"><label style="font-size:0.8rem;color:#64748b;display:block;margin-bottom:8px;">${t('type')}</label><div style="display:flex;gap:12px;"><label><input type="radio" name="searchType" value="all" ${typeVal === 'all' ? 'checked' : ''}> ${t('all')}</label><label><input type="radio" name="searchType" value="expense" ${typeVal === 'expense' ? 'checked' : ''}> ${t('expense')}</label><label><input type="radio" name="searchType" value="income" ${typeVal === 'income' ? 'checked' : ''}> ${t('income')}</label></div></div>
                    <div style="display:flex;gap:10px;margin-bottom:16px;"><button id="doSearchBtn" style="flex:1;background:var(--expense-color);color:white;border:none;padding:10px;border-radius:28px;">${t('search_')}</button><button id="resetSearchBtn" style="flex:1;background:#f1f5f9;border:none;padding:10px;border-radius:28px;">${t('reset')}</button></div>
                    <div id="searchResults" style="max-height:300px;overflow-y:auto;border-top:1px solid #e2e8f0;padding-top:12px;"><div style="text-align:center;color:#94a3b8;padding:20px;">${t('enterConditions')}</div></div>
                `;
                const modal = modalManager.create(t('searchRecords'), html, `<button id="closeSearchBtn" class="close-btn">${t('close')}</button>`);
                if (!modal) return;
                const performSearch = () => {
                    const keyword = document.getElementById('searchKeyword').value.trim().toLowerCase();
                    const startDate = document.getElementById('searchStartDate').value;
                    const endDate = document.getElementById('searchEndDate').value;
                    const minDisplayAmount = parseFloat(document.getElementById('searchMinAmount').value);
                    const maxDisplayAmount = parseFloat(document.getElementById('searchMaxAmount').value);
                    const minAmount = !isNaN(minDisplayAmount) ? convertToStorageAmount(minDisplayAmount) : null;
                    const maxAmount = !isNaN(maxDisplayAmount) ? convertToStorageAmount(maxDisplayAmount) : null;
                    const type = document.querySelector('input[name="searchType"]:checked').value;
                    let results = [...entries];
                    if (startDate) results = results.filter(e => e.date >= startDate);
                    if (endDate) results = results.filter(e => e.date <= endDate);
                    if (keyword) {
                        results = results.filter(e => {
                            const noteMatch = e.note.toLowerCase().includes(keyword);
                            const payTypeDisplay = translateCategory(e.payType || '', currentLanguage).toLowerCase();
                            const payTypeMatch = payTypeDisplay.includes(keyword);
                            return noteMatch || payTypeMatch;
                        });
                    }
                    if (minAmount !== null) results = results.filter(e => e.amount >= minAmount);
                    if (maxAmount !== null) results = results.filter(e => e.amount <= maxAmount);
                    if (type !== 'all') results = results.filter(e => e.type === type);
                    results.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                    const resultsDiv = document.getElementById('searchResults');
                    if (!results.length) {
                        resultsDiv.innerHTML = `<div style="text-align:center;color:#94a3b8;padding:20px;">${t('noResults')}</div>`;
                        return;
                    }
                    let html = '';
                    const defaultPayType = getDefaultPayType();
                    for (const e of results) {
                        const sign = e.type === 'expense' ? '-' : '+';
                        const color = e.type === 'expense' ? uiSettings.expenseColor : uiSettings.incomeColor;
                        const displayAmount = formatSimpleAmount(e.amount);
                        const payTypeDisplay = translateCategory(e.payType || defaultPayType, currentLanguage);
                        html += `<div class="search-result-item" data-id="${e.id}" style="cursor:pointer;"><div><div>${escapeHtml(e.note)}</div><div style="font-size:0.6rem;color:#94a3b8;">${e.date} ${escapeHtml(e.time)} · ${escapeHtml(payTypeDisplay)}</div></div><div style="color:${color};font-weight:600;">${sign}${displayAmount}</div></div>`;
                    }
                    resultsDiv.innerHTML = html;
                    resultsDiv.querySelectorAll('.search-result-item').forEach(item => {
                        item.onclick = () => {
                            const id = item.dataset.id;
                            const entry = entries.find(e => String(e.id) === String(id));
                            if (entry) {
                                selectedDate = entry.date;
                                [currentYear, currentMonth] = [parseInt(entry.date.slice(0, 4)), parseInt(entry.date.slice(5, 7)) - 1];
                                renderCalendar();
                                renderEntries();
                                modalManager.close(modal);
                                showToast(`${t('jumpTo')} ${entry.date}`);
                                setTimeout(() => {
                                    const targetLi = document.querySelector(`li .edit-btn[data-id="${id}"]`)?.closest('li');
                                    if (targetLi) {
                                        targetLi.classList.add('highlight-entry');
                                        targetLi.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                        setTimeout(() => targetLi.classList.remove('highlight-entry'), 2000);
                                    }
                                }, 100);
                            }
                        };
                    });
                };
                modal.querySelector('#doSearchBtn').onclick = performSearch;
                modal.querySelector('#resetSearchBtn').onclick = () => {
                    document.getElementById('searchKeyword').value = '';
                    document.getElementById('searchStartDate').value = formatDateLocal(oneYearAgo);
                    document.getElementById('searchEndDate').value = formatDateLocal(today);
                    document.getElementById('searchMinAmount').value = '';
                    document.getElementById('searchMaxAmount').value = '';
                    document.querySelector('input[name="searchType"][value="all"]').checked = true;
                    document.getElementById('searchResults').innerHTML = `<div style="text-align:center;color:#94a3b8;padding:20px;">${t('enterConditions')}</div>`;
                };
                modal.querySelector('#closeSearchBtn').onclick = () => modalManager.close(modal);
                if (preset) setTimeout(performSearch, 100);
            }
                        // ==================== 分类管理 ====================
            function openCategoryManager(type) {
                const title = type === 'expense' ? t('manageExpenseTitle') : t('manageIncomeTitle');
                let dragStartIndex = null;
                const getCurrentCatsList = () => type === 'expense' ? expenseCats : incomeCats;
                const saveCatsList = async (newList) => {
                    if (type === 'expense') expenseCats = newList;
                    else incomeCats = newList;
                    const success = await saveCategories();
                    if (success) renderCategoryDropdown();
                    return success;
                };
                const renderCategoryList = (container) => {
                    const currentCats = [...getCurrentCatsList()];
                    if (currentCats.length === 0) {
                        container.innerHTML = `<div style="text-align:center;padding:16px;">${t('noCategories')}</div>`;
                        return;
                    }
                    // 显示时翻译
                    const displayCats = translateCategories(currentCats, currentLanguage);
                    container.innerHTML = currentCats.map((cat, idx) => {
                        const displayCat = displayCats[idx] || cat;
                        return `
                            <div class="category-list-item" data-index="${idx}" data-cat="${escapeHtml(cat)}" draggable="true">
                                <div style="display:flex;align-items:center;flex:1;"><span class="drag-handle">☰</span><span>${escapeHtml(displayCat)}</span></div>
                                <div style="display:flex;gap:6px;"><button class="edit-cat-btn" data-cat="${escapeHtml(cat)}">${t('edit')}</button><button class="delete-cat-btn" data-cat="${escapeHtml(cat)}">${t('delete')}</button></div>
                            </div>
                        `;
                    }).join('');
                    const items = container.querySelectorAll('.category-list-item');
                    items.forEach(item => {
                        item.addEventListener('dragstart', (e) => {
                            dragStartIndex = parseInt(item.getAttribute('data-index'));
                            item.classList.add('dragging');
                            e.dataTransfer.effectAllowed = 'move';
                        });
                        item.addEventListener('dragend', () => {
                            item.classList.remove('dragging');
                            items.forEach(i => i.classList.remove('drag-over'));
                        });
                        item.addEventListener('dragover', (e) => {
                            e.preventDefault();
                            e.dataTransfer.dropEffect = 'move';
                            const targetIndex = parseInt(item.getAttribute('data-index'));
                            if (dragStartIndex !== null && dragStartIndex !== targetIndex) {
                                items.forEach(i => i.classList.remove('drag-over'));
                                item.classList.add('drag-over');
                            }
                        });
                        item.addEventListener('drop', (e) => {
                            e.preventDefault();
                            const targetIndex = parseInt(item.getAttribute('data-index'));
                            if (dragStartIndex !== null && dragStartIndex !== targetIndex) {
                                let currentCats = [...getCurrentCatsList()];
                                const [movedItem] = currentCats.splice(dragStartIndex, 1);
                                currentCats.splice(targetIndex, 0, movedItem);
                                saveCatsList(currentCats);
                                renderCategoryList(container);
                                bindCategoryButtons(container);
                            }
                            items.forEach(i => i.classList.remove('drag-over'));
                            dragStartIndex = null;
                        });
                    });
                };

                    container.querySelectorAll('.delete-cat-btn').forEach(btn => {
                        btn.onclick = () => {
                            const catName = btn.getAttribute('data-cat');

                            const modalConfirm = modalManager.create(t('deleteCategory'),
                                `<div style="text-align:center;"><div style="font-size:16px;margin-bottom:6px;">${t('confirmDeleteCategory')}${escapeHtml(displayCatName)}」？</div><div style="font-size:12px;color:#64748b;">${t('deleteNoAffect')}</div></div>`,
                                `<div style="display:flex;gap:10px;"><button id="cancelDelete" style="flex:1;padding:12px;border:none;border-radius:24px;background:#f1f5f9;">${t('cancel')}</button><button id="confirmDelete" style="flex:1;padding:12px;border:none;border-radius:24px;background:#ef4444;color:white;">${t('delete')}</button></div>`);

                    <div class="settings-item"><label class="settings-label">🎨 ${t('cardBg')}</label><div class="hsl-group"><div class="hsl-row"><span class="hsl-sub-label">H</span><input type="range" id="cardBgHue" min="0" max="360" value="${cardBgHsl.h}"><div class="color-preview-block" id="cardBgPreview" style="background:${uiSettings.cardBg}"></div></div><div class="hsl-row"><span class="hsl-sub-label">S</span><input type="range" id="cardBgSat" min="0" max="100" value="${cardBgHsl.s}"></div><div class="hsl-row"><span class="hsl-sub-label">L</span><input type="range" id="cardBgLight" min="20" max="100" value="${cardBgHsl.l}"></div></div></div>
                    <div class="settings-item"><label class="settings-label">🎨 ${t('bgColor')}</label><div class="hsl-group"><div class="hsl-row"><span class="hsl-sub-label">H</span><input type="range" id="bgHue" min="0" max="360" value="${bgHsl.h}"><div class="color-preview-block" id="bgPreview" style="background:${uiSettings.bgColor}"></div></div><div class="hsl-row"><span class="hsl-sub-label">S</span><input type="range" id="bgSat" min="0" max="100" value="${bgHsl.s}"></div><div class="hsl-row"><span class="hsl-sub-label">L</span><input type="range" id="bgLight" min="20" max="100" value="${bgHsl.l}"></div></div></div>
                    <div class="settings-item"><label class="settings-label">📏 ${t('spacing')}</label><input type="range" id="spacingGap" min="6" max="18" value="${uiSettings.spacingGap}"><div class="settings-value" id="spacingValue">${uiSettings.spacingGap}px</div></div>
                    <div class="settings-item"><label class="settings-label">📦 ${t('padding')}</label><input type="range" id="cardPadding" min="6" max="20" value="${uiSettings.cardPadding}"><div class="settings-value" id="paddingValue">${uiSettings.cardPadding}px</div></div>
                    <div class="settings-item"><label class="settings-label">🔤 ${t('fontSize')}</label><input type="range" id="fontSize" min="12" max="22" value="${uiSettings.fontSize}"><div class="settings-value" id="fontValue">${uiSettings.fontSize}px</div></div>
                    <button class="reset-btn" id="resetSettingsBtn">↺ ${t('resetDefault')}</button>
                `;
                const modal = modalManager.create(t('settings'), html, `<button id="closeSettingsBtn" class="close-btn">${t('close')}</button>`);
                if (!modal) return;
                const updateExpense = () => { const c = hslToHex(parseInt(modal.querySelector('#expenseHue').value), parseInt(modal.querySelector('#expenseSat').value), parseInt(modal.querySelector('#expenseLight').value)); modal.querySelector('#expensePreview').style.background = c; window._tempColors.expenseColor = c; };
                modal.querySelector('#expenseHue').oninput = updateExpense;
                modal.querySelector('#expenseSat').oninput = updateExpense;
                modal.querySelector('#expenseLight').oninput = updateExpense;
                const updateIncome = () => { const c = hslToHex(parseInt(modal.querySelector('#incomeHue').value), parseInt(modal.querySelector('#incomeSat').value), parseInt(modal.querySelector('#incomeLight').value)); modal.querySelector('#incomePreview').style.background = c; window._tempColors.incomeColor = c; };
                modal.querySelector('#incomeHue').oninput = updateIncome;
                modal.querySelector('#incomeSat').oninput = updateIncome;
                modal.querySelector('#incomeLight').oninput = updateIncome;
                const updateCardBg = () => { const c = hslToHex(parseInt(modal.querySelector('#cardBgHue').value), parseInt(modal.querySelector('#cardBgSat').value), parseInt(modal.querySelector('#cardBgLight').value)); modal.querySelector('#cardBgPreview').style.background = c; window._tempColors.cardBg = c; };
                modal.querySelector('#cardBgHue').oninput = updateCardBg;
                modal.querySelector('#cardBgSat').oninput = updateCardBg;
                modal.querySelector('#cardBgLight').oninput = updateCardBg;
                const updateBg = () => { const c = hslToHex(parseInt(modal.querySelector('#bgHue').value), parseInt(modal.querySelector('#bgSat').value), parseInt(modal.querySelector('#bgLight').value)); modal.querySelector('#bgPreview').style.background = c; window._tempColors.bgColor = c; };
                modal.querySelector('#bgHue').oninput = updateBg;
                modal.querySelector('#bgSat').oninput = updateBg;
                modal.querySelector('#bgLight').oninput = updateBg;
                modal.querySelector('#spacingGap').oninput = function() { uiSettings.spacingGap = parseInt(this.value); modal.querySelector('#spacingValue').innerText = uiSettings.spacingGap + 'px'; applyUISettings(); };
                modal.querySelector('#cardPadding').oninput = function() { uiSettings.cardPadding = parseInt(this.value); modal.querySelector('#paddingValue').innerText = uiSettings.cardPadding + 'px'; applyUISettings(); };
                modal.querySelector('#fontSize').oninput = function() { uiSettings.fontSize = parseInt(this.value); modal.querySelector('#fontValue').innerText = uiSettings.fontSize + 'px'; applyUISettings(); };
                modal.querySelector('#resetSettingsBtn').onclick = () => {
                    uiSettings = { cardRadius: 24, cardPadding: 16, statPadding: 8, inputPadding: 12, fontSize: 18, expenseColor: '#c2413a', incomeColor: '#2dd4bf', spacingGap: 6, bgColor: '#f1f5f9', cardBg: '#ffffff', darkMode: uiSettings.darkMode };
                    window._tempColors = { expenseColor: uiSettings.expenseColor, incomeColor: uiSettings.incomeColor, cardBg: uiSettings.cardBg, bgColor: uiSettings.bgColor };
                    saveSettings();
                    applyUISettings();
                    updateInputColor();
                    renderTopCards();
                    renderSelectedDayTotal();
                    modalManager.close(modal);
                    showToast(t('resetDefault'));
                };
                modal.querySelector('#closeSettingsBtn').onclick = () => {
                    if (window._tempColors) { uiSettings.expenseColor = window._tempColors.expenseColor; uiSettings.incomeColor = window._tempColors.incomeColor; uiSettings.cardBg = window._tempColors.cardBg; uiSettings.bgColor = window._tempColors.bgColor; saveSettings(); }
                    applyUISettings();
                    updateInputColor();
                    renderTopCards();
                    renderSelectedDayTotal();
                    modalManager.close(modal);
                    showToast(t('settingsSaved'));
                };
            }

            function initBackToTop() {
                const btn = document.getElementById('floatBackTop');
                window.addEventListener('scroll', () => btn.classList.toggle('show', window.scrollY > 300));
                btn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function initServiceWorker() {
                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', async () => { try { await navigator.serviceWorker.register('./sw.js', { scope: './' }); } catch (e) {} });
                }
                window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; updateInstallMenuText(); });
                window.addEventListener('offline', () => showToast(t('offline')));
                window.addEventListener('online', () => showToast(t('online')));
            }

            // ==================== 初始化 ====================
            window.onload = async function() {
                await load();
                rebuildStatsCache();
                bindEvents();
                renderCalendar();
                renderEntries();
                renderCategoryDropdown();
                updateInputColor();
                initBackToTop();
                initServiceWorker();
                updateInstallMenuText();
                const savedBackupTime = localStorage.getItem('lastBackupTime');
                savedBackupTime ? updateBackupStatus(savedBackupTime) : document.getElementById("backupStatus").innerText = t('notBackedUp');
                document.getElementById('loadingOverlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 300);
                window.addEventListener('beforeunload', cleanupTimers);
                document.addEventListener('visibilitychange', () => { if (document.hidden) cleanupTimers(); });
            };

            // ⭐ 弹窗内滚动处理
            document.addEventListener('touchmove', function(e) {
                if (e.target.closest('.modal-body') || e.target.closest('.custom-select-dropdown') || e.target.closest('.menu-dropdown')) { return; }
                if (document.body.classList.contains('modal-open')) { e.preventDefault(); }
            }, { passive: false });
        })();
    </script>
</body>
</html>
